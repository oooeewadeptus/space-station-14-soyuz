name: Publish

concurrency:
  group: publish
  cancel-in-progress: true

on:
  workflow_dispatch:
  # schedule:
   # - cron: '0 10 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: sudo apt-get install -y python3-paramiko python3-lxml python3-requests python3-yaml

    - uses: actions/checkout@v4.2.2
      with:
        submodules: 'recursive'

    # DS14-secrets-start
    - name: Setup secrets
      env:
        SSH_KEY: ${{ secrets.SECRETS_PRIVATE_KEY }}
      if: ${{ env.SSH_KEY != '' }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SECRETS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "HOST *" > ~/.ssh/config
        echo "StrictHostKeyChecking no" >> ~/.ssh/config
        echo "::group::Cloning secrets"
        git clone git@github.com:dead-space-server/space-station-14-secrets.git Secrets
        echo "::endgroup::"
        if [ ! -d "Secrets" ]; then
          echo "::error::Failed to clone secrets repository"
          exit 1
        fi
        echo "Secrets cloned OK"
        cp -R Secrets/Resources/Prototypes Resources/Prototypes/DeadSpaceSecrets
        cp -R Secrets/Resources/ServerPrototypes Resources/Prototypes/DeadSpaceSecretsServer
        cp -R Secrets/Resources/Locale Resources/Locale/ru-RU/deadspace-secrets
        cp -R Secrets/Resources/Textures Resources/Textures/DeadSpaceSecrets
        echo "Resources copied OK"

    - name: Verify secrets
      run: |
        if [ -d "Secrets" ]; then
          echo "Secrets: OK"
        else
          echo "::warning::Secrets not loaded - SECRETS_PRIVATE_KEY may not be configured"
        fi
    # DS14-secrets-end

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 10.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform linux-x64 # only linux, no: --platform win-x64 --platform osx-x64 --platform linux-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    - name: Publish version
      run: python3 -u Tools/publish_multi_request.py
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        GITHUB_REPOSITORY: ${{ vars.GITHUB_REPOSITORY }}

    - name: Publish changelog (Soyuz Discord)
      continue-on-error: true
      run: python3 -u Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK_DEADSPACE }}

    - name: Publish changelog (DeadSpace Discord)
      continue-on-error: true
      run: python3 -u Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}

    # - name: Publish changelog (RSS)
    #   continue-on-error: true
    #   run: Tools/actions_changelog_rss.py
    #   env:
    #     CHANGELOG_RSS_KEY: ${{ secrets.CHANGELOG_RSS_KEY }}
# DS14-Soyuz webhook start
    - name: Get random announce
      id: announce
      run: |
        if [ -f "announce.txt" ]; then
          grep -v '^#' announce.txt | grep -v '^[[:space:]]*$' > /tmp/clean_announces.txt
          total_lines=$(wc -l < /tmp/clean_announces.txt)
          if [ $total_lines -gt 0 ]; then
            random_line=$(( (RANDOM % total_lines) + 1 ))
            announce=$(sed -n "${random_line}p" /tmp/clean_announces.txt)
            echo "announce=$announce" >> $GITHUB_OUTPUT
          else
            echo "announce=Нет доступных объявлений :(" >> $GITHUB_OUTPUT
          fi
        else
          echo "announce=Объявление не найдено :(" >> $GITHUB_OUTPUT
        fi

    - name: Send Discord Webhook Notification (Soyuz Discord)
      if: success()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
        RANDOM_ANNOUNCE: ${{ steps.announce.outputs.announce }}
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{
              "username": "Обновления Союз-1 ☭",
              "avatar_url": "https://github.com/PERed5/soyuz/blob/main/soyuz.png?raw=true",
              "content": "'"$RANDOM_ANNOUNCE"'\n\n<:logo_UNION1:1282351621375791218>Сервер успешно обновлён!<:logo_UNION1:1282351621375791218>\n🥳Все последние изменения Союза ☭ в игре 🥳",
              "embeds": [{
                "image": {
                  "url": "https://media.discordapp.net/attachments/1303329439869833286/1390321152030806026/b6735b3e67e81887.gif"
                }
              }]
              }' \
              $DISCORD_WEBHOOK_URL

    - name: Send Discord Webhook Notification (DeadSpace Discord)
      if: success()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK_DEADSPACE }}
        RANDOM_ANNOUNCE: ${{ steps.announce.outputs.announce }}
      run: |
        curl -H "Content-Type: application/json" \
              -X POST \
              -d '{
              "username": "Обновления Союз-1 ☭",
              "avatar_url": "https://github.com/PERed5/soyuz/blob/main/soyuz.png?raw=true",
              "content": "'"$RANDOM_ANNOUNCE"'\n\n<:logo_UNION1:1282351621375791218>Сервер успешно обновлён!<:logo_UNION1:1282351621375791218>\n🥳Все последние изменения Союза ☭ в игре 🥳\nА больше новых новостей разработки можно получать в дискорд сервере союза, ссылка в закрепах [чата союза](https://discord.com/channels/1030160796401016883/1487331042468565165)",
              "embeds": [{
                "image": {
                  "url": "https://media.discordapp.net/attachments/1303329439869833286/1390321152030806026/b6735b3e67e81887.gif"
                }
              }]
              }' \
              $DISCORD_WEBHOOK_URL
# DS14-Soyuz webhook end
