  - uid: 16683
    components:
    - type: Transform
      pos: 31.71933,-49.560047
      parent: 1
    - type: Paper
      stampState: paper_stamp-trader
      stampedBy:
      - stampTexture: null
        stampedColor: '#000000FF'
        stampedName: Неизвестный работник станции NanoTrasen
      content: >-
        [bold]«Курс домой»

        [/bold]


        Сработали замки. Глухой удар.

        Нас отпускает станция, как мать —

        Усталая, с прожжённой дырой в боку,

        Но всё же не решившая нас предать.


        В иллюминатор — обгорелый край

        Того отсека, где час назад

        Я ползал по стенке, ловя за поручни рай,

        Который пахнет плазмой и был не рад.


        А теперь — тишина. Не сирены вой,

        А та, от которой закладывает уши,

        Когда понимаешь: «я снова живой

        И сердце тихо стучит как у мыши».


        Мы падаем вниз, в голубую муть,

        Где гравитация, дождь и сплетни соседей.

        И так хочется просто вздохнуть, зажмуриться и уснуть,

        Но сон не идёт — слишком много отголосков

        теней


        В этой кромешной, холодной тьме,

        Где каждый твой выдох стоил контракта.

        Я снова увижу, как солнце встаёт на Земле,

        А не светит сквозь дыру от обшивки, где кто-то ломился вдоль технического тракта.


        Не надо ремонтов. Не надо «а вдруг».

        В челноке пахнет потом, железом и пылью.

        Но эта грязная, тесная, рваная друг

        Сейчас меня будоражит только вся эта прибыль..


        Мы летим. И сквозь шум вентиляции мне слышен

        Тот звук, что дороже любых новостей:

        Стук собственного сердца. Он стал чуть выше,

        Обычный земной, человеческий, стук — без соплей.


        Я выжил. И станция осталась за кормой.

        Теперь только вниз, сквозь разряды, сквозь космос, сквозь точки.

        И нет в галактике больше свободы такой,

        Как знать, что сегодня ты ляжешь спать в кровати своей собственной прочной


        Под одеялом. И радио врубишь на ночь.

        И никто не объявит тревогу в четыре утра.

        …Задраить люки. Пошли домой, обормоты.

        Земля, мы идём. Открывайте врата. Пора.
