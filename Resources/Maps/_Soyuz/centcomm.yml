    - type: Paper
      content: >
        [head=3]STATION XX-00[/head]

        [head=3]КОД[/head]

        ═════════════════════════════════════

        [bold]ШАБЛОН ДОКУМЕНТА[/bold]

        ═════════════════════════════════════

        Время от начала смены и дата: 03:23:07 01.05.2707

        Составитель документа:

        Должность составителя:


        Понимаю, что звучит как бред, но решил всё-таки записать, пока не начал убеждать себя, что показалось.


        Вчера возвращался обратно через технический коридор, тот что ведёт к старому доку снабжения. Освещение там, как обычно, наполовину не работает. У выхода заметил администратора станции, он был не один.


        Второй... не похож на кого-то из персонала. Одежда - не стандартная форма, скорее что-то вроде длинного синего плаща. Сначала подумал, что это какой-то представитель внешней делегации, но...


        Я не слышал всего разговора, только обрывок. Администратор сказал:

        "мы не можем продолжать это без одобрения..."

        На что тот что-то спокойно пробормотал, я ничего не расслышал.


        И вот тут самое стрёмное - когда я моргнул, второго уже не было. Просто исчез. Никаких шагов, ничего.
         Администратор остался один, постоял ещё пару секунд и ушёл, как будто ничего не произошло.
        ═════════════════════════════════════

        [italic]Место для печатей[/italic]
