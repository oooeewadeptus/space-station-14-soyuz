        [head=3][color=#c98a1e]ЖУРНАЛ РАЗРАБОТКИ[/color][/head]

        [head=4][color=#6a8fbf]A. ДАЛЛАС (БРИГАДИР, 2-й ИНЖЕНЕР)[/color][/head]

        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]До настоящего момента процесс переработки планеты шел, как было запланированно, хотя мы и потеряли на время контакт с колонией.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Первый срез был доставлен на борт уже через [bold][color=#4da6ff]час после раскола планеты[/color][/bold], обработан, очищен и переплавлен.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Результаты превзошли самые [bold][color=#4caa67]опитимистические прогнозы[/color][/bold]. Обычно любая порода содержит [bold][color=#b8860b]35% минералов[/color][/bold], [bold][color=#7b68cc]5% окаменелостей[/color][/bold], а [bold][color=#c84f4f]60% идет в отходы[/color][/bold]. Но тут мы получили [bold][color=#4caa67]65% минералов[/color][/bold] (и [bold][color=#7b68cc]0% окаменелостей[/color][/bold]).[/color]


        [color=#2f2f2f]Это составляет [bold][color=#4da6ff]6,5 тонн руды на каждые 10 тонн породы[/color][/bold]. Если только это была не аномалия, мы вскрыли [bold][color=#c98a1e]настоящую сокровищницу[/color][/bold].[/color]


        [color=#666666]═════════════════════════════════════[/color]

        [italic][color=#7a7a7a]Внутренний инженерный журнал[/color][/italic]
