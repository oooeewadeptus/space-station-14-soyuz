        [color=#2f2f2f]Несмотря на выслугу в [bold]62 года[/bold], "Ишимура" все еще в [bold][color=#4caa67]прекрасной форме[/color][/bold]. Большинство его систем было модернизировано и усовершенствовано, ряд отсеков перестроен, и преимущества современных технологий используются в полной мере. Несмотря на долгую службу, "Ишимура" по-прежнему остается [bold][color=#4da6ff]гордостью[/color][/bold] и самым большим кораблем флота. Именно поэтому, когда возникает серьезный проект по добыче сокровищ глубокого космоса, первый кандидат на задание - "Ишимура".[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Благодаря кораблям вроде "Ишимуры" и самоотверженному труду их экипажей, [bold][color=#c98a1e]Объединённое правительство Земли[/color][/bold] стала одним из самых уважаемых и надежных работодателей наших дней.[/color]


        [color=#666666]═════════════════════════════════════[/color]

