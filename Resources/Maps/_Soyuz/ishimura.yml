        stampedColor: '#323232FF'
        stampedName: мяу
      content: >-
        [head=4][color=#7a7a7a](Выдержка из раздела "рудные космические разработки" информационного пакета для акционеров СЕС)[/color][/head]


        [head=3][color=#c98a1e]ПОТРОШЕНИЕ ПЛАНЕТ[/color][/head]

        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Точное определение планетарной разработки - широкомасштабная операция, в ходе которой небольшие планеты или их спутники разрывают на части, чтобы добраться до пластов, содержащих ценные минералы и руду. Несмотря на заявления радетелей за окружающую среду, такой способ добычи полезных ископаемых может считаться [bold][color=#4caa67]абсолютно безопасным[/color][/bold]. Кроме того, только данный метод позволяет получить ресурсы в количествах, достаточных для обеспечения нужд Земли и колоний.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Вам, возможно, попадалась информация о том, что разрушение планет приводит к непоправимому нарушению баланса гравитационных сил в звездной системе. Некоторые исследователи даже утверждают, что изъятие одной планеты из системы может спровоцировать сход остальных тел со своих орбит, столкновение планет. Мы предлагаем нашим инвесторам ознакомиться со статьей [bold][color=#4da6ff]"Торжественная клятва СЕС и благополучие нашей Вселенной"[/color][/bold], где развеяны все мифы и пролит свет на процесс разработки. Краткое определение нашей позиции: потрошение планет - [bold][color=#4caa67]абсолютно безопасная процедура[/color][/bold], обеспечивающая благо Земли и колоний. При выборе планет для разработки учитывается не только богатство минеральных пластов и стоимость, но и вопросы безопасности окружающей среды.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Потрошение планет - это длительный цикл работ, занимающий [bold][color=#b8860b]от трех до пяти лет[/color][/bold]. Первый год обычно уходит на основание колонии. Следующие полтора года занимает тектоническая выборка грунта и сопутствующие ей операции на поверхности.[/color]


        [color=#2f2f2f]Корабли класса [bold][color=#7b68cc]"Потрошитель"[/color][/bold] прибывают в период между [bold][color=#4da6ff]2,5 - 3 годами[/color][/bold] от начала работ в зависимости от успеха операции. Как только корабль занимает свое место на орбите, начинается подготовка к подъему пластов планетарной коры. Подготовительные работы занимают около недели.[/color]


        [color=#2f2f2f]Выемка участков коры планеты и их перевод на геостационарную орбиту производится за [bold][color=#4da6ff]1 день (24 стандартных часа)[/color][/bold]. В ходе этого процесса от поднимаемой породы откалываются миллиарды тонн обломков, которые формируют вокруг планеты астероидное кольцо и представляют серьезную опасность. Поэтому все корабли класса [bold][color=#7b68cc]"Потрошитель"[/color][/bold] оснащены [bold][color=#c84f4f]противоастероидными частотно-импульсными пушками[/color][/bold], не позволяющими обломкам приблизиться к корпусу корабля.[/color]


        [color=#2f2f2f]В зависимости от размеров объекта процесс выборки повторяют снова и снова, пока планета не оказывается переработанной целиком.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [head=3][color=#4da6ff]КТО МЫ[/color][/head]

        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]CEC - крупнейшая в земных колониях компания по межзвездной добыче и переработке руды. В масштабах капитализации компания занимает [bold][color=#b8860b]5 место на рынке[/color][/bold], представляя собой мощную промышленную и политическую силу. Благодаря существенным средствам, потраченным на предвыборные кампании, СЕС неуклонно улучшает свои рыночные позиции.[/color]


        [color=#2f2f2f]В распоряжении СЕС находится более [bold][color=#4da6ff]400 кораблей[/color][/bold], предназначенных для полетов в глубоком космосе, в том числе и пять [bold][color=#7b68cc]"Планетарных Потрошителей"[/color][/bold] с известнейшим флагманским кораблем [bold][color=#4da6ff]USG "Ишимура"[/color][/bold]. СЕС стала первой компанией, внедрившей технологию переработки планет и астероидов, первой, приспособившей силовой двигатель для коммерческого использования. Мы также являемся крупнейшим поставщиком ценных металлов.[/color]


        [color=#2f2f2f]Из более чем трех дюжин успешных операций по переработке планет, лишь одна не привела к оптимальным результатам. Многие помнят о [bold][color=#c84f4f]Ванатской Катастрофе[/color][/bold], случившейся [bold][color=#b8860b]11 лет назад[/color][/bold], когда в результате ошибки погибли [bold][color=#7b68cc]"Планетарный Потрошитель"[/color][/bold], [bold][color=#4da6ff]3 корабля сопровождения[/color][/bold] и колония на планете. С того дня СЕС пересмотрела свои отношения с поставщиками и ввела обязательный курс подготовки для членов экипажей, чтобы избежать повторения катастрофы подобного масштаба.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Мы очень ответственно относимся к вашему благополучию и к благополучию наших сотрудников. Инвестируя в [bold][color=#c98a1e]СЕС[/color][/bold], вы вкладываете деньги в [bold][color=#4caa67]процветание человечества[/color][/bold].[/color]


        [color=#666666]═════════════════════════════════════[/color]

        [italic][color=#7a7a7a]Информационный материал для акционеров СЕС[/color][/italic]
