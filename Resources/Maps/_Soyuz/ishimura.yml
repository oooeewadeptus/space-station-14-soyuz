    - type: Paper
      content: "СТАВ ЕДИНЫМ МЫ... ВОЗНЕСЕМСЯ?\r\nЮнитология - новая надежда или очередная афера?\r\nКэрри Ван Отткен\r\n\r\nНадо провести последние 200 лет в глухой марсианской колонии, чтобы пропустить рождение и становление Юнитологии - самого быстроразвивающегося религиозного течения за всю историю человечества.\r\nЦерковь Юнитологии насчитывает миллионы последователей, среди которых множество влиятельных фигур мира политики и бизнеса; ее активы составляют 78 миллиардов долларов в ценных бумагах транспланетных корпораций, а сама церковь владеет двумя крупнейшими финансовыми структурами Земли (GPSG Financial и Unitas Energy Investments). Из малоизвестного культа Юнитология превратилась в уважаемую и официально признанную религию.\r\nНекоторые аспекты этого течения общеизвестны. Двести лет назад Майкл Атман[1], профессор антропологии, во всеуслышание обвинил власти Земли в заговоре с целью сокрыть величайшую из находок человечества - артефакт или, как его еще называют, \"Обелиск\", который был создан, вне всякого сомнения, инопланетной цивилизацией. Хотя власти тут же поспешили обьявить Атмана сумасшедшим, его заявления породили сомнения в сердцах некоторых людей. Загадочная смерть Атмана только подогрела общественный интерес к фигуре и заявлениям профессора.\r\nЮнитологи искренне считают, что Обелиск содержит некий код, который позволит нам перейти на новую ступень эволюции и достичь рая (загвоздка в том, что сначала придется умереть).\r\nОни заявляют, что правительство спрятало Обелиск и засекретило всю информацию об этой находке, в том числе и результаты научных исследований. Распространившись по всем человеческим мирам, юнитологи проповедуют догматы о мученической смерти Атмана и о том, что придет день, когда с небес спустится сам Господь, и заберет нас в свои чертоги, дав жизнь после смерти.\r\nВсе это звучит невинно, если бы не ряд некоторых очень сомнительных моментов.\r\nВсе прихожане Юнитологической церкви делятся на ранги. Об этом, конечно, не говорят в открытую, но критики считают, что существует как минимум 3 различных иерархических ранга, стоящих над обычным \"посвященным\". Чем выше ранг юнитолога, тем больше секретов открывает перед ним церковь. Которая, как не трудно догадаться, получает взамен все финансы \"продвинутого прихожанина\".\r\nДумаете, расстаться со своими сбережениями - это все, что можно потерять? Приготовьтесь - церковь также требует от своих прихожан, чтобы они завещали культу собственные тела после смерти! Зачем? Что юнитологи будут делать с трупами? Увы, это неизвестно, и любые попытки проникнуть во внутренний круг лидеров культа закончиваются провалом. Хотя даже не знаю насколько нам понравился бы правдивый ответ, учитывая основной догмат юнитологов - \"перерождение через трансформацию\".\r\nХодят упорные слухи, что церковь финансирует собственную судостроительную программу. Кто-то даже утверждает, что видел флот юнитологов, состоящий из огромных кораблей-мавзолеев. Возможно, это и не пустые домыслы, хотя никаких документальных подтверждений им обнаружить не удалось "
