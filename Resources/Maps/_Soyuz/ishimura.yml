        [color=#2f2f2f]Это моя скорбная обязанность сообщить всем о том, что капитан [bold][color=#c84f4f]Бенджамин Матиус мертв[/color][/bold].[/color]


        [color=#2f2f2f]Сообщения о событиях, приведших к его смерти, крайне запутаны, поэтому мне приходится оперировать лишь [bold][color=#5f8ea8]данными вскрытия[/color][/bold].[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Объект находился в прекрасной физической форме для своего возраста, хотя анализ крови обнаружил [bold][color=#b8860b]низкое содержание лейкоцитов[/color][/bold], при [bold][color=#c84f4f]беспрецедентно высоком уровне эозинофильных лейкоцитов[1][/color][/bold]. Данные его предполетного обследования не содержат никаких указаний на то, что капитан был чем-то болен. Хотя, даже при нынешних показателях, аномалии крови не стали бы причиной смерти.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Множественные ушибы на руках и предплечьях свидетельствуют о том, что объект перед смертью оказывал [bold][color=#4caa67]активное сопротивление[/color][/bold]. Кровоподтеки на грудной клетке заставляют предположить, что объект перед смертью был связан.[/color]


        [color=#2f2f2f]Причина смерти - [bold][color=#c84f4f]удар длинным тонким предметом в глазное яблоко[/color][/bold], с дальнейшим повреждением лобных долей мозга, что вызвало серьезную [bold][color=#7b68cc]нейротравму[/color][/bold] с последующим летальным исходом.[/color]


        [color=#2f2f2f]Чтобы нанести подобную травму, требуется значительное усилие, а вероятность несчастного случая с подобными результатами крайне мала.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]На основании всего вышесказанного я выношу предварительный вердикт [bold][color=#c84f4f]"НАСИЛЬСТВЕННАЯ СМЕРТЬ"[/color][/bold]. Кто именно был ее причиной, находится уже вне моей компетенции.[/color]


        [color=#666666]═════════════════════════════════════[/color]

