        [color=#666666]═════════════════════════════════════[/color]


        [head=4][color=#7b68cc]АЙЗЕК КЛАРК[/color][/head]


        [color=#2f2f2f]Айзек, сын Пола и Октавии Кларк, родился на восточной прибрежной платформе Американской Республики, планета Земля. Пол Кларк - неоднократно отмеченный наградами инженер-кораблестроитель, работавший на [bold][color=#4da6ff]Galactic Union Marine Corp[/color][/bold]. Как следует из личного дела, был вынужден часто и подолгу оставлять свою семью, выполняя работы вне пределов Земли.[/color]


        [color=#2f2f2f]Когда родился Айзек, Пола был временно переведен на земной кораблестроительный комплекс [bold][color=#4da6ff]GUMMC[/color][/bold], где проработал в течении четырех лет, получив возможность вместе с супругой воспитывать сына. По истечении этого срока, Пол в очередной раз отправился в продолжительную командировку.[/color]


        [color=#2f2f2f]Пол оказал очень сильное влияние на Айзека, который, судя по записям в деле, взялся за изучение инженерного дела и электромеханики, показав в процессе обучения самые высокие результаты.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Согласно медицинским и психиатрическим отчетам, отсутствие Пола Кларка существенно сказалось на Октавии. Супруга Пола Кларка переживала периоды глубокой депрессии и приступы острой тоски, пока врачи не порекомендовали ей найти отдушину на поприще благотворительности. Есть основания полагать, что именно таким образом Октавия Кларк вступила в контакт с [bold][color=#c98a1e]Церковью Юнитологии[/color][/bold].[/color]


        [color=#2f2f2f]Вовлеченность в церковные дела, по всей видимости, усугубила психологический кризис. Отказ от терапии совпал с объявлением местного прихода об инициации Октавии Кларк.[/color]


        [color=#2f2f2f]Дальнейшие записи об ее жизни отрывочны и скудны. Есть информация, что Октавия продала практически все имущество семьи, чтобы оплатить полное членство в церкви.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]К тому времени Айзек поступил в престижный инженерный вуз, однако, судя по всему, не имел возможность оплатить обучение, так как впоследствии обучался в более скромном институте, предлагавшем стипендию и финансовую помощь лучшим студентам.[/color]


        [color=#2f2f2f]Айзек окончил вуз с отличием и завербовался в [bold][color=#4caa67]Merchant Marines[/color][/bold]. Он быстро завоевал репутацию талантливого и грамотного инженера, что позволило ему через два года получить повышение и перевестись на службу в район с более интенсивным движением космического транспорта.[/color]


        [color=#2f2f2f]В архивах хранится несколько запросов Айзека о местонахождении отца, которые были размещены его друзьями в [bold][color=#4da6ff]GUMMC[/color][/bold]. Вероятно, все эти годы Айзек не терял надежды воссоединиться с Кларком-старшим. Но шансов на это было мало, так как дело Пола Кларка по неизвестным причинам оказалось засекреченным на самом высшем уровне.[/color]


        [color=#2f2f2f]Октавия продолжала свою деятельность в церкви и скоро сумела достичь сана [bold][color=#7b68cc]Посвященной[/color][/bold].[/color]


        [color=#2f2f2f]Карьера Айзека, между тем, стала катиться вниз. Существуют записи, что в течении нескольких лет он сожительствовал с офицером-медиком [bold][color=#c84f4f]Николь Бреннан[/color][/bold]. Записи также показывают, что она была повышена в ранге и переведена служить на борт корабля [bold][color=#4da6ff]USG "Ишимура"[/color][/bold].[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [head=4][color=#7b68cc]КЕНДРА ДЭНИЕЛС[/color][/head]


        [color=#2f2f2f]Мне не удалось найти каких-либо данных о ней, но Дарлтон готов поклясться в ее надежности. Именно по его рекомендации она попала в экипаж для этой миссии. Если он полагает, что у нее есть все необходимые навыки, кто я такая[1], чтобы это оспаривать?[/color]


        [color=#666666]═════════════════════════════════════[/color]

        [italic][color=#7a7a7a]Служебный ответ по запросу личного дела[/color][/italic]
