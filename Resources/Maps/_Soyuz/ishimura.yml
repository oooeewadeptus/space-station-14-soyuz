        [color=#2f2f2f]Уверен, ты знаешь, что я сильнее кого-либо еще хотел исследовать этот удивительный артефакт, и понимаю, что ситуация в колонии заставляет тебя действовать быстро. Но в этом, как раз, и вся загвоздка - то, что происходит внизу, невозможно объяснить какими-либо [bold][color=#c84f4f]естественными причинами[/color][/bold], и нам необходимо время, чтобы [bold][color=#4d8f6b]досконально проанализировать ситуацию[/color][/bold].[/color]


