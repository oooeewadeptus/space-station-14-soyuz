        [color=#2f2f2f]Многие читатели старшего поколения наверняка помнят время, когда Земля и колонии были уже не в состоянии обеспечить нужды человечества. Залежи природных ископаемых нашей планеты оказались полностью истощены, а скудные поставки материалов из колоний не могли ослабить тиски наступившего кризиса. Новые месторождения на отдаленных звездах существовали и ранее, однако силовой двигатель, позволявший летать в глубоком космосе, мог быть установлен лишь на небольших кораблях, не способных перевозить существенные грузы.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [bold][color=#c98a1e]Пока не появился "Ишимура".[/color][/bold]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]USG "Ишимура", получивший свое имя в честь создателя силового двигателя, астрофизика [italic][color=#5aa7c7]Хидеки Ишимуры[/color][/italic], стал первым гигантским кораблем класса [bold][color=#c98a1e]"Планетарный Потрошитель"[/color][/bold]. Построенный [bold]62 года назад[/bold], корабль может похвастать самой яркой и долгой карьерой. "Ишимура" - первое космическое судно, способное использовать силовой двигатель для [bold][color=#4caa67]масштабных коммерческих операций[/color][/bold] по добыче руды в глубоком космосе.[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Еще до того, как покинуть стапели верфи, "Ишимуру" стали воспринимать в качестве [bold][color=#b88a2a]спасителя Земли и колоний[/color][/bold]. Корабль был создан для того, чтобы целиком перерабатывать небольшие планеты и луны. Кроме того, "Ишимура" - первый в серии корабль, который может находить и [bold][color=#c98a1e]"ловить"[/color][/bold] богатые минералами астероиды. При помощи мощного [color=#7d68d6]гравитационного захвата[/color] эти небесные тела подтягиваются на борт корабля и полностью переплавляются в [bold][color=#4caa67]чистую руду[/color][/bold].[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Несмотря на выслугу в [bold]62 года[/bold], "Ишимура" все еще в [bold][color=#4caa67]прекрасной форме[/color][/bold]. Большинство его систем было модернизировано и усовершенствовано, ряд отсеков перестроен, и преимущества современных технологий используются в полной мере. Несмотря на долгую службу, "Ишимура" по-прежнему остается [bold][color=#4da6ff]гордостью[/color][/bold] и самым большим кораблем флота. Именно поэтому, когда возникает серьезный проект по добыче сокровищ глубокого космоса, первый кандидат на задание - "Ишимура".[/color]


        [color=#666666]═════════════════════════════════════[/color]


        [color=#2f2f2f]Благодаря кораблям вроде "Ишимуры" и самоотверженному труду их экипажей, [bold][color=#c98a1e]Объединённое правительство Земли[/color][/bold] стала одним из самых уважаемых и надежных работодателей наших дней.[/color]


        [color=#666666]═════════════════════════════════════[/color]

