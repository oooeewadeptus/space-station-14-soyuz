        ═════════════════════════════════════

        [bold]Вырванная страница дневника[/bold]

        ═════════════════════════════════════

        Время от начала смены и дата: 09:56 ##.##.####

        Составитель документа: Николь Хошино

        Должность составителя: Старший медицинский сотрудник.


        Совсем недавно наш корабль начал разробатывать один из кусков планеты Эрида-7. И там нашли что-то странное... артефакт, покрытый разными символами. Экипаж начал сходить с ума, некоторых привели в мой отдел на обследование. 


        Казалось бы, они совсем недавно были здоровые психически и физически, а теперь... их состояние стремительно ухужшается. Как это произошло? Неужели дело в артефакте? Или может на планете они вдохнули какой-то газ? 


        Я доложила об этом капитану, но он лишь покачал головой со словами: "Пускай твои люди подлатают их и вернут обратно. Нам нужно закончить раскопки". Это возмутительно! Но мои следующие попытки поговорить на эту тему он проигнорировал. Не к добру это...
