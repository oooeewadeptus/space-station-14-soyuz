- type: reagent
  id: TearGas
  name: reagent-name-tear-gas
  group: Narcotics
  desc: reagent-desc-tear-gas
  physicalDesc: reagent-physical-desc-milky
  allowedDepartments:
  - Security
  flavor: salty
  color: "#ffffff4d"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
    Narcotic:
      effects:
      - !type:PopupMessage
        type: Local
        probability: 0.08
        messages:
        - generic-reagent-effect-burning-eyes
        - generic-reagent-effect-burning-eyes-a-bit
        - generic-reagent-effect-tearing-up
        - norepinephricacid-effect-eyelids
        - norepinephricacid-effect-eyes-itch
        - norepinephricacid-effect-vision-fade
        - norepinephricacid-effect-vision-fail
# DS-14-start
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ SuperSoldier ]
          inverted: true
# DS-14-end
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        probability: 0.03
        messages:
        - norepinephricacid-effect-eye-disconnect
        - norepinephricacid-effect-eye-pain
        - norepinephricacid-effect-darkness
        - norepinephricacid-effect-blindness
# DS-14-start
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ SuperSoldier ]
          inverted: true
# DS-14-end
      - !type:Emote
        emote: Scream
        probability: 0.08
        conditions:
        - !type:ReagentCondition
          reagent: TearGas
          min: 4
      - !type:Emote
        emote: Cough
        probability: 0.08
      - !type:Emote # DS14
        emote: Crying
        probability: 0.04
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
