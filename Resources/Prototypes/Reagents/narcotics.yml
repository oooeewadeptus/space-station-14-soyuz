          reagent: TearGas
          min: 4
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
        time: 1.5
        conditions: # because of the remainding after effect, threshold is given so the effects ends simultaniously
        - !type:ReagentCondition
          reagent: TearGas
          min: 4

