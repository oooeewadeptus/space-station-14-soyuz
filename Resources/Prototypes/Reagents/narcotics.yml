- type: reagent
  id: Desoxyephedrine
  name: reagent-name-desoxyephedrine
  group: Narcotics
  desc: reagent-desc-desoxyephedrine
  physicalDesc: reagent-physical-desc-translucent
  contrabandSeverity: Minor
  flavor: bitter
  color: "#FAFAFA"
  boilingPoint: 212.0  # Dexosyephedrine vape when?
  meltingPoint: 170.0
  metabolisms:
    Poison:
      # Main effects
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.75 # DS-14
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 30 # DS-14
        damage:
          types:
            Poison: 2 # DS-14
            Asphyxiation: 2
    Narcotic:
      effects:
      # Main effects
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.35 # DS-14
        sprintSpeedModifier: 1.35 # DS-14
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
        # DS-14-start
      - !type:Jitter
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 3
        type: Remove
      - !type:ModifyKnockdown
        time: 3
        type: Remove
        # DS-14-end
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
    Medicine:
      effects:
      # Side effects
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 5

- type: reagent
  id: Ephedrine
  name: reagent-name-ephedrine
  group: Narcotics
  desc: reagent-desc-ephedrine
  physicalDesc: reagent-physical-desc-powdery
  contrabandSeverity: Minor
  flavor: bitter
  color: "#D2FFFA"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
# DS14-start: Ephedrine rebalance
    Narcotic:
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.25 # DS-14
        sprintSpeedModifier: 1.25 # DS-14
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Ephedrine
          min: 20
        damage:
          types:
            Poison: 2 # DS-14
            Asphyxiation: 2
        # DS-14-start
      - !type:Jitter 
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 1
        type: Remove
      - !type:ModifyKnockdown
        time: 1
        type: Remove
        # DS-14-end
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
        # DS-14-start
      - !type:PopupMessage
        visualType: Medium
        messages: ["ephedrine-effect-tight-pain", "ephedrine-effect-heart-pounds"]
        type: Local
        probability: 0.05
        # DS-14-end
    Medicine:
      effects:
      # Side effects
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: Ephedrine
          min: 15

- type: reagent
  id: Stimulants
  name: reagent-name-stimulants
  group: Narcotics
  desc: reagent-desc-stimulants
  physicalDesc: reagent-physical-desc-energizing
  contrabandSeverity: Syndicate
  flavor: sharp
  color: "#9A040E"
  boilingPoint: 212.0
  meltingPoint: 170.0
  metabolisms:
    Narcotic:
      metabolismRate: 1.0 # DS-14
      effects:
      - !type:MovementSpeedModifier
      # DS-14-start
        walkSpeedModifier: 1.3
        sprintSpeedModifier: 1.3
      - !type:HealthChange
        conditions:
          - !type:ReagentCondition
            reagent: Stimulants
            min: 80 #please wait 3 minutes before using another stimpack
        damage:
          types:
            Poison: 1
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
        # DS-14-end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 3.5
        type: Remove
      - !type:ModifyKnockdown
        time: 3.5
        type: Remove
        # DS-14-start
      - !type:GenericStatusEffect
        key: StaminaModifier
        component: StaminaModifier
        time: 3
        # DS-14-end
      - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 3
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 3
      # Side effects
      - !type:Jitter
      # OD
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Stimulants
          min: 45
        damage:
          types:
            Poison: 3
      # Interactions
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
    Medicine:
      effects:
      # DS-14-start
        - !type:ResetNarcolepsy
        - !type:SatiateHunger
          factor: 1
        - !type:SatiateThirst
          factor: 1
        - !type:HealthChange
          conditions:
          - !type:TotalDamageCondition
            min: 70 # only heals when you're more dead than alive
          damage: # heals at the same rate as tricordrazine, doesn't heal poison because if you OD'd I'm not giving you a safety net
            groups:
              Burn: -1
              Brute: -1
      # DS-14-end

