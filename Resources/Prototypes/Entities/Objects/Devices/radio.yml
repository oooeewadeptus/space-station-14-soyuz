- type: entity
  id: RadioToggleAction
  parent: BaseAction
  name: переключить рацию
  components:
  - type: Action
    useDelay: 1
  - type: InstantAction
    event: !type:RadioToggleEvent

- type: entity
  name: handheld radio
  description: A handy handheld radio.
  parent: BaseItem
  id: RadioHandheld
  components:
  - type: TelecomExempt
  - type: RadioMicrophone
    broadcastChannel: Handheld
  - type: RadioSpeaker
    channels:
    - Handheld
  - type: Speech
    speechVerb: Robotic
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: walkietalkie
    - state: walkietalkie-on
    state: walkietalkie
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: walkietalkie
  - type: Tag
    tags:
    - Radio
  # DS14-start
  - type: Language
  - type: RadioToggleAction
  - type: Clothing
    slots:
    - neck
    quickEquip: false
    equippedPrefix: walkietalkie
  - type: UniformAccessory
    category: Radio
    limit: 1
    color: "#EFB401" 
  - type: Appearance
  # DS14-end

- type: entity
  name: security radio
  description: A handy security radio.
  parent: [ RadioHandheld, BaseSecurityContraband ]
  id: RadioHandheldSecurity
  components:
  - type: RadioMicrophone
    broadcastChannel: Security
    listenRange: 1
  - type: RadioSpeaker
    channels:
    - Security
  - type: Sprite
    sprite: Objects/Devices/securityhandy.rsi
  - type: Item
    sprite: Objects/Devices/securityhandy.rsi
    heldPrefix: walkietalkie
  # DS14-start
  - type: Language
  - type: UniformAccessory
    category: Radio
    limit: 1
    color: "#326496" 
  # DS14-end
