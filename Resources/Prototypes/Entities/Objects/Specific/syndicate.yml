
- type: entity
  name: telecrystal
  parent: [BaseItem, BaseSyndicateContraband]
  id: Telecrystal
  suffix: 20 TC
  description: It seems to be pulsing with suspiciously enticing energies.
  components:
  - type: Sprite
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    state: telecrystal
  - type: Item
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    size: Tiny
  - type: Stack
    count: 20
    stackType: Telecrystal
  - type: StaticPrice
    price: 0
  - type: StackPrice
    price: 200
  - type: Currency
    price:
      Telecrystal: 1

- type: entity
  parent: Telecrystal
  id: Telecrystal1
  suffix: 1 TC
  components:
  - type: Stack
    count: 1

- type: entity
  parent: Telecrystal
  id: Telecrystal5
  suffix: 5 TC
  components:
  - type: Stack
    count: 5

- type: entity
  parent: Telecrystal
  id: Telecrystal10
  suffix: 10 TC
  components:
  - type: Stack
    count: 10

# Uplinks
- type: entity
  parent: [BaseItem, StorePresetUplink, BaseSyndicateContraband]
  id: BaseUplinkRadio
  name: syndicate uplink
  description: Suspiciously looking old radio...
  suffix: Empty
  components:
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: old-radio
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: old-radio
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Telecrystal: 0

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio20TC
  suffix: 20 TC
  components:
  - type: Store
    balance:
      Telecrystal: 20

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio25TC
  suffix: 25 TC
  components:
  - type: Store
    balance:
      Telecrystal: 25

#this uplink MUST be used for nukeops, as it has the tag for filtering the listing.
- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio40TC
  suffix: 40 TC, NukeOps
  components:
  - type: Store
    balance:
      Telecrystal: 40
  - type: Tag
    tags:
    - NukeOpsUplink
# DS14-start
    - Grenade
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Objects/Misc/nokia.rsi
    layers:
    - state: nokia3310
      scale: 0.7, 0.7
      shader: unshaded
  - type: Item
    sprite: _DeadSpace/_Soyuz/Objects/Misc/nokia.rsi
    heldPrefix: nokia3310
    size: Small
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_DeadSpace/Soyuz/Item/Nokia/nokia_activate_sound.ogg
  - type: SpentAmmoVisuals
  - type: CartridgeAmmo
    proto: BulletGrenadeNokia # DS14-Soyuz
  - type: UseDelay
    delay: 10
  - type: UseDelayOnMeleeHit
  - type: MeleeThrowOnHit
    stunTime: 0.5
    activateOnThrown: true
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 8
        Structural: 5
  - type: LandAtCursor
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Structural: 5
# DS14-end

- type: entity
  parent: BaseUplinkRadio40TC #DS14
  id: BaseUplinkRadio60TC
  suffix: 60 TC, LoneOps
  components:
  - type: Store
    balance:
      Telecrystal: 60
  - type: Tag
    tags:
    - NukeOpsUplink
    - LoneOpsUplink #DS-14

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadioDebug
  suffix: DEBUG
  components:
  - type: Store
    balance:
      Telecrystal: 99999
    expectedFaction: #nulls out the expected faction
