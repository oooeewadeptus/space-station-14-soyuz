      replacement: IronRock
      entity: IronRockQuartz
      count: 28 #DS14
      minGroupSize: 10 #DS14
      maxGroupSize: 15 #DS14
    - !type:OreDunGen
      replacement: IronRock
      entity: IronRockSalt
      count: 25 #DS14
      minGroupSize: 8 #DS14
      maxGroupSize: 12 #DS14
    - !type:OreDunGen
      replacement: IronRock
      entity: IronRockGold
      count: 18 #DS14
      minGroupSize: 10 #DS14
      maxGroupSize: 20 #DS14
    - !type:OreDunGen
      replacement: IronRock
      entity: IronRockSilver
      count: 18 #DS14
      minGroupSize: 10 #DS14
      maxGroupSize: 20 #DS14
    - !type:OreDunGen
      replacement: IronRock
      entity: IronRockPlasma
      count: 18 #DS14
      minGroupSize: 10 #DS14
      maxGroupSize: 20 #DS14
    - !type:OreDunGen
      replacement: IronRock
      entity: IronRockUranium
      count: 18 #DS14
