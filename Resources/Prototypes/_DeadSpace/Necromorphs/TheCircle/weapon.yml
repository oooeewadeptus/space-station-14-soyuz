        types:
          Slash: 12
          Structural: 20
      soundHit:
        collection: splinter-blade-attack
      soundNoDamage:
        collection: splinter-blade-miss
    - type: Item
      sprite: _DeadSpace/Necromorfs/TheCircle/Weapon/melee/hand-hook.rsi
      size: Large
      shape:
      - 0,0,3,2
    - type: AmmoCounter
    - type: GrapplingGun
      pullTargetToShooter: true 
      reelRate: 175
      cycleSound:
        path: /Audio/_DeadSpace/Necromorfs/TheCircle/Weapon/sfx/hook-sfx/reload_hook.ogg
      ropeSprite:
        sprite: _DeadSpace/Necromorfs/TheCircle/Weapon/melee/hand-hook.rsi
