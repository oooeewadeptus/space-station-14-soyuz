## Клинок-обелиск
- type: entity
  parent: BaseImplantOnlyImplanterSyndi
  id: UnitologySplinterBladeImplanter
  name: имплантер пробуждение клинка
  description: Подозрительный имплант неизвестного происхождения.
  components:
  - type: Implanter
    implant: UnitologySplinterBladeImplant

- type: entity
  parent: BaseSubdermalImplant
  id: UnitologySplinterBladeImplant
  name: имплантер пробуждение клинка
  description: По всей видимости, вживляет в руку осколочный клинок.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionRetractableItemUnitologySplinterBladeImplant
    whitelist:
      components:
      - Hands

- type: entity
  parent: BaseAction
  id: ActionRetractableItemUnitologySplinterBladeImplant
  name: "[color=red]Освободить клинок[/color]"
  description: Взовите их к своему Богу.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 1
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _DeadSpace/Necromorfs/TheCircle/Weapon/melee/splinter-blade.rsi
      state: icon
  - type: InstantAction
    event: !type:OnRetractableItemActionEvent
  - type: RetractableItemAction
    spawnedPrototype: WeaponUnitologySplinterBlade
    summonSounds:
      collection: splinter-blade-extend
    retractSounds:
      collection: splinter-blade-retract

- type: entity
  parent: BaseItem
  id: WeaponUnitologySplinterBlade
  name: осколочный клинок
  description: Лезвием пройдусь я вдоль линии твоих вен.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Necromorfs/TheCircle/Weapon/melee/splinter-blade.rsi
    state: icon
  - type: Item
    sprite: _DeadSpace/Necromorfs/TheCircle/Weapon/melee/splinter-blade.rsi
  - type: NecroobeliskSplinter
    soundHeadaches:
      collection: SoundsHeadaches
  - type: LimitedCharges
    maxCharges: 1
  - type: CollisionWake
    enabled: false
  - type: InteractionOutline
  - type: AutoRecharge
    rechargeDuration: 180
  - type: MeleeWeapon
    attackRate: 1.35
    damage:
      types:
        Slash: 12
        Caustic: 4
        Structural: 20
    soundHit:
      collection: splinter-blade-attack
    soundNoDamage:
      collection: splinter-blade-miss
  - type: SolutionContainerManager
    solutions:
      melee:
        reagents:
        - ReagentId: ExtractInfectorDead
          Quantity: 999999
  - type: MeleeChemicalInjector
    solution: melee
    transferAmount: 1.5
  - type: Sharp
  - type: ComponentToggler
    components:
    - type: PointLight
      color: "#48141e"
      radius: 6
      energy: 2.5
    - type: Reflect
      inRightPlace: True
      reflectProb: 0.15
      spread: 90
      soundOnReflect:
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      collection: splinter-blade-attack
    activatedSoundOnHitNoDamage:
      collection: splinter-blade-miss
    activatedDamage:
      types:
        Slash: 20
        Heat: 6
        Structural: 35
  - type: ItemToggle
