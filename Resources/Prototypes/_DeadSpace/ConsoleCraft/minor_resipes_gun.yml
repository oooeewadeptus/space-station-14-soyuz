# Лектер
- type: minorItemModule
  id: LecterExtendedAmmoMag
  moduleItem: LecterExtendedAmmoMagModuleItem
  description: Поддержка большего магазина
  components:
    ItemSlots:
      slots:
        gun_magazine:
          name: Magazine
          startingItem: ADTExtMagazineRifle
          insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
          priority: 2
          whitelist:
            tags:
              - MagazineRifle
              - ADTExtMagazineRifle

- type: minorItemModule
  id: RateOfFireLecterStandart
  moduleItem: RateOfFireLecterModuleItemStandart
  description: Ускореная стрельба
  components:
    Gun:
      fireRate: 6
      fireRateModified: 6

- type: minorItemModule
  id: RateOfFireLecterAdvanced
  moduleItem: RateOfFireLecterModuleItemAdv
  description: Продвинутая ускоренная стрельба
  components:
    Gun:
      fireRate: 6.5
      fireRateModified: 6.5

