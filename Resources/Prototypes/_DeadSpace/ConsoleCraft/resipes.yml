# Закреплённые чертежи при крафте

- type: consoleCraft
  id: ResearchModifiedBackpack
  name: Модифицированный рюкзак научного специалиста
  item: ClothingBackpackRIGResearch
  time: 10
  requestItems:
  - itemProto: MediumCoreForModifiedBackpack
    amount: 1
    label: Среднее ядро модифицированного рюкзака
  - itemProto: PlastineOfResearchRIG
    amount: 2
    label: Пластина для модифицированного рюкзака НИО
  - itemProto: HardsuitFrameLeg
    amount: 1
    label: Каркас ног скафандра
  - itemProto: HardsuitFrameTorso
    amount: 1
    label: Каркас торса скафандра
  - itemProto: ClothingHeadHelmetRIGResearch
    amount: 1
  minorItems:
  - StorageModule
  - SpeedModifierModuleResearch
  - DelayModifierModule
  - RadiationResistanceModuleResearch
  - ExplosionResistanceModuleResearch
  - HandHeldMassScannerModule
  - BluespaceHandHeldMassScannerModule

