- type: ertTeam
  id: Cburn
  name: РХБЗЗ
  notification: ert-responce-caused-messager-cburn
  approvalColor: "#3f6e70"
  approvalAudio:
    path: /Audio/Misc/delta_alt.ogg
  startAnnouncement: station-event-response-team-arrival-cburn
  startAudio:
    path: /Audio/_DeadSpace/_Soyuz/Announcements/centcomm.ogg # DS14-Announcements | DS14-Soyuz value
  description: 
    Специализированный отряд радиационной, химической, биологической и зомби защиты
    СССП. Предназначен для локализации утечек опасных веществ,
    биологических угроз, а также проведения дезинфекции и эвакуации персонала
    в условиях заражения.
    5 бойцов РХБЗЗ и 1 лидер прибывают на шаттле РХБЗЗ, который оснащён
    всем необходимым оборудованием для выполнения их миссии.
    Время прибытия отряда от 10 до 15 минут.
  sender: ert-response-cso-sender
  rule: SpawnCburnShuttle
  cooldown:
    min: 15m
    max: 15m
  spawnWindow:
    min: 10m
    max: 15m
  price: 4
  codeBlackList:
  - enigma
  - epsilon
  - gamma
  spawns:
    - id: RandomHumanoidSpawnerCBURNLeader
      amount: 1
    - id: RandomHumanoidSpawnerCBURNAgent
      amount: 5

