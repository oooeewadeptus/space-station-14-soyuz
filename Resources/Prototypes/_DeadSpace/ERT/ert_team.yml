- type: ertTeam
  id: Red
  name: СОБР Красный
  notification: ert-response-caused-messager-red
  approvalColor: "#a66286"
  approvalAudio:
    path: /Audio/Misc/gamma.ogg
  startAnnouncement: station-event-response-team-arrival-red
