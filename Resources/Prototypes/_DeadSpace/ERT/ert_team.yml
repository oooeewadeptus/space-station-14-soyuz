- type: ertTeam
  id: CentralCommandOfficial
  name: Представитель ГШ
  startAnnouncement: station-event-centcomm-official-arrival
  startAudio:
    path: /Audio/_DeadSpace/_Soyuz/Announcements/centcomm.ogg # DS14-Announcements | DS14-Soyuz value
  description: 
    Представитель Генерального Штаба, прибывающий на станцию
    для решения возникших проблем, которые не могут быть решены обычным способом.
    Представитель Генерального Штаба и 3 оперативника КГБ прибывают
    на шаттле, который оснащён всем необходимым оборудованием
    для выполнения их миссии.
    Время прибытия от 5 до 7 минут.
  notification: ert-response-caused-messager-official
  rule: SpawnCentCommOfficialShuttle
  cancelMessage: 
    Представитель Центрального Командования NanoTrasen не смог прибыть на станцию
    из-за непредвиденных обстоятельств. Мы приносим извинения за возможные неудобства.
  cooldown:
    min: 7m
    max: 7m
  spawnWindow:
    min: 5m
    max: 7m
  price: 0
  codeBlackList:
  - sierra
  - red
  - enigma
  - delta
  - epsilon
  - gamma
  special: CustomizableSpawnerCentralCommandOfficial
  spawns:
    - id: CustomizableSpawnerCentralCommandBlueShieldOfficer
      amount: 3
