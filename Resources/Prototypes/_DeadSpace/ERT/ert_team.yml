- type: ertTeam
  id: Engineers
  name: СОБР Инженеры
  notification: ert-response-caused-messager-engineers
  approvalAudio:
    path: /Audio/_DeadSpace/_Soyuz/Announcements/centcomm.ogg # DS14-Announcements | DS14-Soyuz value
  startAnnouncement: station-event-response-team-arrival
  startAudio:
    path: /Audio/_DeadSpace/_Soyuz/Announcements/centcomm.ogg # DS14-Announcements | DS14-Soyuz value
  description: 
    Отряд инженеров СССП, специализирующихся на ремонте и техническом обслуживании
    космических станций и кораблей. Они обладают обширными знаниями в области
    инженерии, систем жизнеобеспечения и ремонта оборудования.
    4 инженера прибывают на инженерном шаттле, оснащённом всем необходимым оборудованием
    для выполнения их миссии.
    Время прибытия отряда от 5 до 10 минут.
  rule: SpawnEngineersShuttle
  cooldown:
    min: 10m
    max: 10m
  spawnWindow:
    min: 5m
    max: 10m
  price: 2
  codeBlackList:
  - sierra
  - red
  - enigma
  - delta
  - epsilon
  - gamma
  spawns:
    - id: RandomHumanoidSpawnerERTLeaderAmber
      amount: 1
    - id: RandomHumanoidSpawnerERTEngineerAmber
      amount: 3

