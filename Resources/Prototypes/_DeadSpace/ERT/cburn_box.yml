# Box

- type: entity
  id: ERTloadoutCBURN
  name: кейс неопределённости
  description: Прочный военный кейс, содержащий снаряжение подразделений РХБЗЗ.
  suffix: РХБЗЗ
  parent: BaseERTloadoutPrimary
  components:
  - type: Sprite
    state: cburn
  - type: ThiefUndeterminedBackpack
    possibleSets:
    - CBURNSet
    - CBURNNecroSet
    - CBURNSpiderSet
  - type: ActivatableUI
    key: enum.ThiefBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.ThiefBackpackUIKey.Key:
        type: ThiefBackpackBoundUserInterface

- type: entity
  id: ERTloadoutCBURNLeader
  name: кейс неопределённости лидера
  description: Прочный военный кейс, содержащий снаряжение лидеров подразделений РХБЗЗ.
  suffix: РХБЗЗ, Лидер
  parent: BaseERTloadoutPrimary
  components:
  - type: Sprite
    state: cburn
  - type: ThiefUndeterminedBackpack
    possibleSets:
    - LeaderCBURNSet
    - LeaderCBURNNecroSet
    - LeaderCBURNSpiderSet
  - type: ActivatableUI
    key: enum.ThiefBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.ThiefBackpackUIKey.Key:
        type: ThiefBackpackBoundUserInterface

# Sets

