- type: entity
  parent: BaseComputerAiAccess
  id: ErtResponseConsole
  name: консоль запроса поддержки НКВБ
  description: Консоль запроса поддержки НКВБ которая отправляет сигнал специальным отрядам быстрого реагирования для оказания поддержки станции в критических ситуациях.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: request-sec
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      visible: false
      state: generic_panel_open
  - type: Computer
    board: ErtResponseConsoleCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#B64444"
  - type: ActivatableUI
    key: enum.ErtResponseConsoleUiKey.Key
  - type: UserInterface
    interfaces:
        enum.ErtResponseConsoleUiKey.Key:
          type: ErtResponseConsoleBoundUserInterface
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: ErtResponseConsole
    teams:
    - Cburn
    - SCST
    - SCNT
    - CburnSierra
    - Gamma
    - Red
    - Amber
    - Engineers
    - BSAA
    useApprovalWorkflow: true
  - type: ContainerContainer
    containers:
      board: !type:Container
        showEnts: False
        occludes: True
        ents: []
      ErtConsole-auth-a: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      ErtConsole-auth-b: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
  - type: ItemSlots
    slots:
      ErtConsole-auth-a:
        name: ert-console-auth-slot-a
        swap: false
      ErtConsole-auth-b:
        name: ert-console-auth-slot-b
        swap: false
  - type: Language
    selectedLanguage: GeneralLanguage

- type: entity
  parent: BaseComputerAiAccess
  id: ErtComputerShuttle
  name: консоль эвакуации сил НКВБ
  description: Консоль для эвакуации сил НКВБ с предприятия СССП.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: request-sec
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      visible: false
      state: generic_panel_open
  - type: Computer
    board: ErtComputerShuttleCircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#B64444"
  - type: ActivatableUI
    key: enum.ErtComputerShuttleUiKey.Key
  - type: UserInterface
    interfaces:
        enum.ErtComputerShuttleUiKey.Key:
          type: ErtComputerShuttleBoundUserInterface
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: ErtComputerShuttle
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["ErtTeamLeader"]]
  - type: Language
    selectedLanguage: GeneralLanguage

- type: entity
  parent: ErtComputerShuttle
  id: ErtCounterpartyComputerShuttle
  name: консоль собр НКВБ
  description: Консоль собр НКВБ для экстренных команд реагирования.
  components:
  - type: Computer
    board: ErtCounterpartyComputerShuttleCircuitboard
  - type: AccessReader
    access: [["CounterpartyNT"]]

- type: entity
  parent: BaseComputerCircuitboard
  id: ErtCounterpartyComputerShuttleCircuitboard
  name: машинная плата консоли собр НКВБ
  description: Компьютерная печатная плата для консоли собр НКВБ.
  components:
    - type: Sprite
      state: cpu_command
    - type: ComputerBoard
      prototype: ErtCounterpartyComputerShuttle

- type: entity
  parent: BaseComputerCircuitboard
  id: ErtComputerShuttleCircuitboard
  name: машинная плата консоли эвакуации сил НКВБ
  description: Компьютерная печатная плата для консоли эвакуации сил НКВБ.
  components:
    - type: Sprite
      state: cpu_command
    - type: ComputerBoard
      prototype: ErtComputerShuttle

- type: entity
  parent: BaseComputerCircuitboard
  id: ErtResponseConsoleCircuitboard
  name: машинная плата консоли запроса поддержки НКВБ
  description: Компьютерная печатная плата для консоли запроса поддержки НКВБ.
  components:
    - type: Sprite
      state: cpu_command
    - type: ComputerBoard
      prototype: ErtResponseConsole
