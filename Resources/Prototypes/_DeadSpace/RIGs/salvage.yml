- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackRIGSalvage
  name: модифицированный рюкзак утилизационного специалиста
  description: Повышенной вместительности рюкзак с функцией РИГ промышленного производства для станционных утилизаторов.
  components:
  - type: Storage
    grid:
    - 0,0,7,6
  - type: Clothing
    equipDelay: 3
    unequipDelay: 3
  - type: Sprite
    sprite: _DeadSpace/RIGs/Salvage/Standart/backpack.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: ToggleableClothing
    toggleDelay: 3
    clothingPrototype: ClothingOuterRIGSalvage
    requiredSlot: BACK
    slot: outerClothing
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      storagebase: !type:Container
        ents: []

- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCargoContraband]
  id: ClothingOuterRIGSalvage
  name: скафандр утилизационного специалиста
  description: При его осмотре можно подметить читаемую в каждой детали надёжность.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Salvage/Standart/outer.rsi
  - type: Clothing
    sprite: _DeadSpace/RIGs/Salvage/Standart/outer.rsi
    equipSound: /Audio/_DeadSpace/Misc/rig_equip.ogg
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.65
        Radiation: 0.3
        Caustic: 0.3
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: StaminaResistance
    damageCoefficient: 0.6
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetRIGSalvage

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetRIGSalvage
  name: шлем скафандра утилизационного специалиста
  description: Его лицевая пластина полностью скрывает эмоции, не позволяя им пробиться даже через тонированный визор.
  components:
  - type: Sprite
    sprite: _DeadSpace/RIGs/Salvage/Standart/helmet.rsi
    scale: 0.7, 0.7
  - type: Clothing
    sprite: _DeadSpace/RIGs/Salvage/Standart/helmet.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.9
        Heat: 0.95
  - type: PointLight
    color: "#40E0D0"
    radius: 5
    energy: 3
  - type: Item
    heldPrefix: off 
    size: Normal

