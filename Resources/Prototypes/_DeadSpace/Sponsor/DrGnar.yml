# Crusher
- type: entity
  id: WeaponCrusherDrGnar
  parent: WeaponCrusherGlaive
  name: алая Королева
  description: Клинок цвета запекшейся крови отлит из сплава адамантия и демонической стали, закалённой в пламени преисподней. Его рукоять украшена гравировкой в виде огненной розы, которая пульсирует в такт сердцебиению владельца.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/crusher.rsi
    layers:
    - state: icon
  - type: Item
    sprite: _DeadSpace/Sponsor/DrGnar/crusher.rsi
    size: Huge
  - type: Clothing
    sprite: _DeadSpace/Sponsor/DrGnar/crusher.rsi
    quickEquip: false
    slots:
    - suitStorage
  - type: BasicEntityAmmoProvider
    proto: BulletCharge
    capacity: 1
    count: 1
  - type: PointLight
    color: "#ffba53"
    enabled: false
    radius: 4

#proto-kinetic accelerator
- type: entity
  parent: BaseItem
  id: WeaponProtoKineticAcceleratorDrGnar
  categories: [ HideSpawnMenu ]
  name: голубая Роза
  description: Двуствольный револьер, способный стрелять зарядами, наполненными демонической энергией.
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/kinetic.rsi
    layers:
    - state: icon
    - state: animation-icon
      visible: false
      map: [ "empty-icon" ]
  - type: Item
    sprite: _DeadSpace/Sponsor/DrGnar/kinetic.rsi
    size: Small
    shape:
    - 0,0,1,1
  - type: Clothing
    sprite: _DeadSpace/Sponsor/DrGnar/kinetic.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    angleDecay: 45
    minAngle: 44
    maxAngle: 45
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_DeadSpace/Sponsor/DrGnar/protokinet.ogg
    projectileSpeed: 25
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
        #todo: add other 'empty' animations
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.75
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletKinetic
    capacity: 1
    count: 1
  - type: UseDelay
    delay: 1
  - type: UpgradeableGun
    whitelist:
      tags:
      - PKAUpgrade
  - type: ContainerContainer
    containers:
      upgrades: !type:Container

#instruments
#drill
- type: entity
  parent: BaseItem
  id: PowerDrillDrGnar
  name: дрель Невана
  description: Инструмент, способный превращаться в дрель или гаечный ключ, под визжащий вой при его работе.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/tools_powerdrill.rsi
    state: drill_screw
  - type: Item
    sprite: _DeadSpace/Sponsor/DrGnar/tools_powerdrill.rsi
    size: Small
  - type: Tool
    qualities:
      - Screwing
    speedModifier: 1.5
    useSound: /Audio/Items/drill_use.ogg
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Screwing
        sprite:
          sprite: _DeadSpace/Sponsor/DrGnar/tools_powerdrill.rsi
          state: drill_screw
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        sprite:
          sprite: _DeadSpace/Sponsor/DrGnar/tools_powerdrill.rsi
          state: drill_bolt
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
  - type: PhysicalComposition
    materialComposition:
      Steel: 300
      Plastic: 100
  - type: StaticPrice
    price: 100
  - type: MeleeWeapon
    wideAnimationRotation: -90
    attackRate: 1.5
    damage:
      types:
        Piercing: 10
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"

#JawsOfLife
- type: entity
  parent: JawsOfLife
  id: JawsOfLifeDrGnar
  name: челюсти Цербера
  description: В этих челюстях заключена сила короля Цербера, способная в форме кусачек разрезать любой провод и в форме монтировки - открыть любую дверь.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Sponsor/DrGnar/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Sponsor/DrGnar/tools_jawsoflife.rsi
          state: syn_jaws_cutter
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 14

