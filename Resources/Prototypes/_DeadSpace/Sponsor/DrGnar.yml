# PDA
- type: entity
  parent: BaseMedicalPDA
  id: PDADrGnar
  name: пента-линк
  description: демонический КПК, созданный на стыке древних магических знаний и современных технологий. Корпус выточен из чёрного обсидиана с инкрустацией из серебра, образующей идеальную пентаграмму. В её центре пульсирует алый кристалл — источник энергии, питающий устройство. 
  categories: [ HideSpawnMenu ]
  components:
  - type: Icon
    sprite: _DeadSpace/Sponsor/DrGnar/pda.rsi
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/pda.rsi
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NanoTaskCartridge
      - NewsReaderCartridge
      - MedTekCartridge
      - AstroNavCartridge
  - type: PdaBorderColor
    borderColor: "#6d1f1f"

