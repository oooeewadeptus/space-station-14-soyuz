# Backpack
- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackDrGnar
  name: демонический грифон
  description: Эта чудовищная птица постоянно находится неподалеку от своего владельца, готовая всегда предоставить обширный арсенал.
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/backpack.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/DrGnar/backpack.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        scale: 0.75, 0.75
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,12,7
  - type: StorageFill
    contents:
    - id: ClothingHandsGlovesDrGnar
    - id: ClothingShoesBootsMagDrGnar
    - id: ClothingBeltDrGnar
    - id: ClothingHeadsetDrGnar
    - id: PDADrGnar
    - id: JetpackVoidFilleddDrGnar
    - id: ClothingOuterHardsuitDrGnar
    - id: PaperDrGnar
    - id: MedkitAdvancedFilled
    - id: ClothingOuterWinterCoatDrGnar
    - id: WeaponProtoKineticAcceleratorDrGnar
    - id: WeaponCrusherDrGnar
    - id: JukeboxMK
    - id: TapeRecorderr
    - id: TapeEmpty
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

