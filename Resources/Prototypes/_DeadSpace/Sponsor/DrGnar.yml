#mineralscanner
- type: entity
  id: MineralScannerDrGnar
  name: сканер Спарды
  description: Пробужденная форма стандартного сканера минералов, способная найти малейшие частички руды в твердом камне.
  parent: [ MineralScannerUnpowered, PowerCellSlotMediumItem ]
  categories: [ HideSpawnMenu ]
  components:
  - type: ToggleCellDraw
  - type: PowerCellDraw
    drawRate: 2.4 # ~5 minutes on a medium power cell.
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/tools_mineralscanner.rsi
    layers:
    - state: adv
    - state: adv-o
      shader: unshaded
      visible: false
      map: ["enum.ToggleableVisuals.Layer"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-adv
      right:
      - state: inhand-right-adv

#gasanalyzer
- type: entity
  name: сканнер Балрога
  parent: BaseItem
  id: GasAnalyzerDrGnar
  description: Металлический сканер, созданный для определения малейших частиц газа в этой адской атмосфере.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DrGnar/tools_gasanalyzer.rsi
    layers:
      - state: icon
        map: ["analyzer"]
  - type: GasAnalyzer
  - type: ActivatableUI
    inHandsOnly: true
    singleUser: true
    requireActiveHand: false
    key: enum.GasAnalyzerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.GasAnalyzerUiKey.Key:
        type: GasAnalyzerBoundUserInterface
  - type: Appearance
  - type: GenericVisualizer
    visuals:
        enum.GasAnalyzerVisuals.Enabled:
          enabled:
            True: { state: working }
            False: { state: icon }
  - type: StaticPrice
    price: 80
  - type: PhysicalComposition
    materialComposition:
      Steel: 400
      Glass: 100
  - type: GuideHelp
    guides:
    - AtmosTools
    - PipeNetworks
    - Pipes

#t-ray scanner
- type: entity
  name: сканер Аластора
  parent: BaseItem
  id: trayScannerDrGnar
  description: Сканер, олицетворяющий Громового Дьвола Аластора, открывающий тайны, скрывающиеся под металлическим полом.
