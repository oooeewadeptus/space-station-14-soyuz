#plushie
- type: entity
  parent: BasePlushieDeadSpaceMisc
  id: PlushieHolyPainEri
  name: плюшевая Эри
  description: "Скажите ей спасибо, что оказались в такой ситуации! На бирке виднеется надпись: HolyPain"
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/HolyPain/plush.rsi
    state: icon
  - type: Item
    sprite: _DeadSpace/Sponsor/HolyPain/plush.rsi
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/Toys/weh.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Items/Toys/weh.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      path: /Audio/Items/Toys/weh.ogg
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: JuiceThatMakesYouWeh
        Quantity: 30
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: Fiber
          Quantity: 10
        - ReagentId: JuiceThatMakesYouWeh
          Quantity: 10
  - type: Clothing
    quickEquip: false
    sprite: _DeadSpace/Sponsor/HolyPain/plush.rsi
    slots:
    - HEAD
  - type: Speech
    speechVerb: Reptilian
  - type: FoodSequenceElement
    entries:
      CottonBurger: LizardPlushie
  - type: Tag
    tags:
    - Payload
    - ClothMade
    - PlushieLizard
  - type: SpeakOnTrigger
    pack: HolyPainPlushieSpeak
  - type: TTS
    voice: Naisha

- type: localizedDataset
  id: HolyPainPlushieSpeak
  values:
    prefix: holypainplushie-
    count: 17