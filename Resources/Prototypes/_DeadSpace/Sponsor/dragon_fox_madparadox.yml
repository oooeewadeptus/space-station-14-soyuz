#Hypo
- type: entity
  name: гипоспрей «Горизонт Бездны»
  parent: BaseItem
  description: Высокотехнологичное медицинское устройство, вдохновлённое физикой чёрных дыр. В отличие от обычных безыгольных инъекторов, он использует микрогравитационные поля для доставки препаратов и может работать с экзотическими веществами, включая стабилизированные частицы, имитирующие излучение Хокинга.
  id: HyposprayDragonFoxMadParadox
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: hypo_fill
    solutionName: hypospray

- type: entity
  parent: DefibrillatorCompact
  name: портативный дефибриллятор «Сингулярный Импульс»
  description: Высокотехнологичный портативный дефибриллятор, вдохновлённый физикой чёрных дыр. Устройство использует принципы гравитационного воздействия и квантовых эффектов для точной диагностики и восстановления сердечного ритма. В основе работы — модуль микросингулярности, создающий контролируемое микрогравитационное поле, которое помогает локализовать и синхронизировать электрический импульс.
