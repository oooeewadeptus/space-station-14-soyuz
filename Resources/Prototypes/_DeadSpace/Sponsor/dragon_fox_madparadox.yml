  description: Высокотехнологичное устройство связи, вдохновлённое эффектами, наблюдаемыми вблизи чёрных дыр - гравитационным линзированием, излучением Хокинга и акустическими волнами в аккреционных дисках. Устройство создаёт эффект «космического эха» — звук воспринимается так, будто отражается от горизонта событий чёрной дыры. Гарнитура блокирует внешние шумы на 99% (как чёрная дыра поглощает свет) и усиливает сигнал связи за счёт микрогравитационных полей. Предназначена для пилотов, исследователей аномалий, спецподразделений.
