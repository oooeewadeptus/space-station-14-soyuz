# HARDSUIT & HELMET
- type: entity
  parent: ClothingHeadEVAHelmetBase
  id: ClothingHeadHelmetHardsuitDragonFoxMadParadox
  name: шлем  «Бездна Смотрит»
  description: Шлем «Бездна Смотрит» — высокотехнологичное защитное снаряжение, вдохновлённое физикой чёрных дыр. Его визор имитирует горизонт событий, а встроенные системы используют принципы гравитационного искажения для защиты носителя. Предназначен для работы в экстремальных условиях - от заражённых зон до областей с гравитационными аномалиями.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hardsuit_helmet.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: hood-icon
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hardsuit_helmet.rsi
  - type: Appearance
  - type: Foldable
    canFoldInsideContainer: true
  - type: FoldableClothing
    foldedEquippedPrefix: hood
    foldedHeldPrefix: hood
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
  - type: GroupExamine
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: GenericVisualizer
    visuals:
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}

- type: entity
  parent: ClothingOuterHardsuitSecurity
  id: ClothingOuterHardsuitDragonFoxMadParadox
  name: броня «Покров чёрной бездны»
  description: Броня выглядит как переливающаяся тёмная субстанция, напоминающая ткань пространства‑времени вблизи чёрной дыры. Её поверхность не отражает свет — напротив, она будто поглощает его, создавая эффект мерцающей пустоты. По контурам доспехов пробегают тонкие линии искривлённого света — словно гравитационные волны, застывшие в металле. Шлем скрывает лицо носителя, оставляя лишь две точки тусклого излучения вместо глаз. Воплощает мощь и таинственность космических чёрных дыр. Её конструкция использует принципы гравитационного искажения и квантовой защиты. Капюшон создаёт вокруг носителя поле, имитирующее горизонт событий, — оно поглощает и рассеивает атаки. Броня предназначена для воинов и исследователей, работающих в экстремальных условиях - от радиационных зон до областей с гравитационными аномалиями.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hardsuit.rsi
  - type: Clothing
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/hardsuit.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitDragonFoxMadParadox
  - type: Item
    size: Huge
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.4
        Heat: 0.5
        Radiation: 0.5
        Caustic: 0.5
        Stun: 0.65
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HardsuitSpeedBuff
  - type: PowerCellDraw
    drawRate: 3.6 # 100 seconds on the default cell
    enabled: false
  - type: PowerCellSlot
    cellSlotId: cell_slot
    # throwing in a recharger would bypass glove charging mechanic
    fitsInCharger: false
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
      toggleable-clothing: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        disableEject: true
        whitelist:
          tags:
            - PowerCell
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    color: "#9f2489"
    radius: 10
    energy: 3
    netsync: true
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

