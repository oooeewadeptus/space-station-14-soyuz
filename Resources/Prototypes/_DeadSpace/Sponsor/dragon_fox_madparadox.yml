#instruments
#drill
- type: entity
  parent: BaseItem
  id: PowerDrillDragonFoxMadParadox
  name: электродрель «Модуль Шварцшильда»
  description: Высокотехнологичная электродрель, вдохновлённая физикой чёрных дыр и концепцией радиуса Шварцшильда (гравитационного радиуса). Устройство использует принципы концентрации энергии в точке для создания сверхмощного крутящего момента - подобно тому, как чёрная дыра искривляет пространство‑время, дрель концентрирует усилие в зоне сверления.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/tools_powerdrill.rsi
    state: drill_screw
  - type: Item
    sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/tools_powerdrill.rsi
    size: Small
  - type: Tool
    qualities:
      - Screwing
    speedModifier: 1.5
    useSound: /Audio/Items/drill_use.ogg
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Screwing
        sprite:
          sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/tools_powerdrill.rsi
          state: drill_screw
        useSound:
          path: /Audio/Items/drill_use.ogg
        changeSound:
          path: /Audio/Items/change_drill.ogg
      - behavior: Anchoring
        sprite:
          sprite: _DeadSpace/Sponsor/DragonFox/MadParadox/tools_powerdrill.rsi
