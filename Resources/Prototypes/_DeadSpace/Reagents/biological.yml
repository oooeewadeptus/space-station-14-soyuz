- type: reagent
  id: AcidicBlood
  name: reagent-name-acidic-blood
  group: Biological
  desc: reagent-desc-acidic-blood
  flavor: acid
  color: "#669900"
  physicalDesc: reagent-physical-desc-strong-smelling
  recognizable: true
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Caustic: 0.6
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Xenomorph ]
          inverted: true
      - !type:Emote
        emote: Scream
        probability: 0.2
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Xenomorph ]
          inverted: true
  metabolisms:
    Poison:
      metabolismRate: 3.00
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 12
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Xenomorph ]
          inverted: true
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.33
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Xenomorph ]
          inverted: true
      - !type:Emote
        emote: Scream
        probability: 0.25
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Xenomorph ]
          inverted: true
  footstepSound:
    collection: FootstepBlood
    params:
      volume: 6

- type: reagent
  id: Ichorosil
  name: reagent-name-mini-dragon-acid
  group: Biological
  desc: reagent-desc-mini-dragon-acid
  physicalDesc: reagent-physical-desc-viscous
  flavor: medicine
  color: "#fee612"
  metabolisms:
    Medicine:
      effects:
      - !type:ModifyBleed
        amount: -1.5
      - !type:EvenHealthChange
        damage:
          Burn: -0.7
          Airloss: -0.5
          Brute: -0.8
      - !type:SatiateThirst
        factor: 4

- type: reagent
  id: SpikeAcid
  name: reagent-name-spike-acid
  group: Biological
  desc: reagent-desc-spike-acid
  physicalDesc: reagent-physical-desc-spike
  flavor: spike
  color: "#093d00"
  metabolisms:
    Poison:
      metabolismRate: 0.75
      effects:
      - !type:HealthChange
        damage:
          types:
            Piercing: 4
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.25
      - !type:Emote
        emote: Scream
        probability: 0.2
