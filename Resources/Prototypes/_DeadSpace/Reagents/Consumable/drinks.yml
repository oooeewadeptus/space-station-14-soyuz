- type: reagent
  id: Baltica9
  name: reagent-name-baltica9
  parent: BaseAlcohol
  desc: reagent-desc-baltica9
  physicalDesc: reagent-physical-desc-bubbly
  flavor: alcohol
  color: "#8B4513"
  recognizable: true
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.06
      - !type:HealthChange
        conditions:
        - !type:TotalDamageCondition
          max: 50
        damage:
          types:
            Blunt: -0.2
            Poison: -0.2
            Heat: -0.2
            Shock: -0.2
            Cold: -0.2

- type: reagent
  id: CactusJuice
  name: reagent-name-cactusjuice
  parent: BaseAlcohol
  desc: reagent-desc-cactusjuice
  physicalDesc: reagent-physical-desc-hallucinogenic-and-refreshing
  flavor: cactus
  color: "#067500c0"
  metabolisms:
    Narcotic:
      effects:
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        type: Add
        time: 10
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 3
      - !type:PopupMessage
        visualType: Small
        messages: ["Вы видите огромные грибы. Может они добрые?"]
        type: Local
        probability: 0.05
      - !type:PopupMessage
        visualType: Small
        messages: ["Добрый гриб! Давай дружить!"]
        type: Local
        probability: 0.05
  metamorphicSprite:
    sprite: /Textures/_DeadSpace/Objects/Consumable/Drinks/cactusjuice.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false

- type: reagent
