#=================================================================================================================
# Для добавления нового геймрула необходимо:
# 1. Добавить его ID в список rules в нужной категории (gameRuleCategory)
# 2. Создать запись gameRuleDisplayName с этим ID и его названием по форме:
# - type: gameRuleDisplayName
#   id: (ID геймрула, например BlobSpawn)
#   name: (Его отображаемое имя, например Носитель блоба)
#=================================================================================================================
# По необходимости можно создавать новые категории, локализация находится по пути: 
# Resources\Locale\ru-RU\_deadspace\administration\manage-gamerules.ftl
# Если геймрул не существует или не найден, он будет отображаться красным цветом в панели, и не будет добавляться.
#=================================================================================================================

