# DS14 ERT

# Leader
## Amber
- type: job
  id: ERTLeaderAmber
  name: job-name-ertleader-amber
  description: job-description-ertleader
  playTimeTracker: JobERTLeaderAmber
  setPreference: false
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 36000 # 10 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 72000 # 20 hours
    - !type:DepartmentTimeRequirement
      department: Command
      time: 36000 # 10 hours
  startingGear: ERTLeaderGearAmber
  icon: "JobIconERTLeader"
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  - ErtTeamLeader
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, TrackingImplant ]
  - !type:AddComponentSpecial
    components:
      # DS14-Start
      - type: Skill
        group: ALL
      # DS14-End

- type: startingGear
  id: ERTLeaderGearAmber
  equipment:
    jumpsuit: ClothingUniformJumpsuitERTLeader
    back: ClothingBackpackRIGERTLeader
    mask: ClothingMaskGasERT
    eyes: ClothingEyesHudERT
    ears: ClothingHeadsetCentCom
    neck: ClothingNeckMantleERTLeader
    gloves: ClothingHandsGlovesCombat
    outerClothing: ClothingOuterArmorBulletproof
    suitstorage: WeaponDisablerSMG
    shoes: ClothingShoesBootsMagHos
    head: ClothingHeadHelmetERTLeader
    id: ERTLeaderPDA
    belt: ClothingBeltMilitaryWebbingERT
    pocket1: DoubleEmergencyOxygenTankFilled
    pocket2: FlashlightSeclite
  storage:
    back:
    - ERTloadoutAmberPrimary
    - ERTloadoutAmberSecondary
    - PinpointerNuclear
    - BoxCardboardERT
    - JawsOfLife
    - PortableCameraMonitor
    - CriminalRecordsMonitor
    - HandheldCrewMonitor
    - MedkitCombatFilled

