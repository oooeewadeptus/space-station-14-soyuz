# DS14 CBURN GEAR

# Leader
## CBURN
- type: job
  id: CBURNLeader
  name: job-name-cburn-leader
  description: job-description-cburnleader
  playTimeTracker: JobCBURNLeader
  setPreference: false
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 36000 # 10 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 72000 # 20 hours
    - !type:DepartmentTimeRequirement
      department: Command
      time: 36000 # 10 hours
  startingGear: CBURNLeaderGear
  icon: "JobIconERTLeader"
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  - ErtTeamLeader
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, TrackingImplant ]

- type: startingGear
  id: CBURNLeaderGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBrown
    mask: ClothingMaskGasExplorer
    eyes: ClothingEyesHudAdvanced
    ears: ClothingHeadsetCentCom
    neck: ClothingNeckMantleCBURNLeaderShoulder
    gloves: ClothingHandsGlovesCombat
    outerClothing: ClothingOuterHardsuitCBURNLeader
    shoes: ClothingShoesBootsJackSecFilled
    id: CBURNLeaderPDA
    pocket1: DoubleEmergencyOxygenTankFilled
    pocket2: DoorRemoteCustom
  inhand:
  - ERTloadoutCBURNLeader

