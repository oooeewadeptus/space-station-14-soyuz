# Молния

- type: entity
  id: WizardEffectLightning
  name: спавнер молний
  components:
  - type: TimedDespawn
    lifetime: 0.01
  - type: SpawnOnDespawn
    prototype: WizardEffectLightningMarker
  - type: Sprite
    sprite: Markers/cross.rsi
    state: red
  - type: Marker

- type: entity 
  id: WizardEffectLightningMarker
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Wizard/effects/lightning.rsi
    state: light
  - type: TimedDespawn
    lifetime: 1.5
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_DeadSpace/Wizard/Effect/lightning_start.ogg
      params:
        maxDistance: 25
    positional: true
  - type: TriggerOnSpawn
  - type: SpawnOnDespawn
    prototype: SpawnWizardEffectLightningExplosion
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: SpawnWizardEffectLightningExplosion
  categories: [ HideSpawnMenu ]
  components:
  - type: TriggerOnSpawn
  - type: SpawnOnTrigger
    proto: WizardEffectLightningExplosion
  - type: Sprite
    sprite: _DeadSpace/Wizard/effects/lightning.rsi
  - type: TimedDespawn
    lifetime: 0.01
  - type: SpawnOnDespawn
    prototype: TeslaWizardLightning
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: WizardEffectLightningExplosion
  categories: [ HideSpawnMenu ]
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Cryo
    totalIntensity: 20.0
    intensitySlope: 5
    maxIntensity: 4
    canCreateVacuum: true
    deleteAfterExplosion: true
  - type: TimedDespawn
    lifetime: 0.1
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/_DeadSpace/Wizard/Effect/lightning_hit.ogg"
    positional: true

- type: entity
  name: шаровая молния
  id: TeslaWizardLightning
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 5
  - type: Sprite
    sprite: Structures/Power/Generation/Tesla/energy_miniball.rsi
    layers:
    - state: tesla_projectile
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 75
  - type: EmbeddableProjectile
  - type: Projectile
    deleteOnCollide: false
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: LightningArcShooter
    arcDepth: 1
    maxLightningArc: 10
    shootMinInterval: 0.5
    shootMaxInterval: 1.5
    shootRange: 10
    lightningPrototype: WizardLightning
  - type: Electrified
    requirePower: false
  - type: Tag
    tags:
      - HideContextMenu

- type: entity
  name: lightning
  id: WizardLightning
  parent: BaseLightning
  categories: [ HideSpawnMenu ]
  components:
    - type: Lightning
      canArc: true
    - type: Electrified
      requirePower: false
      ignoreInsulation: true
# Огонь

- type: entity
  id: WizardFireSpawn
  name: спавнер огня мага
  components:
  - type: Sprite
    sprite: _DeadSpace/Wizard/effects/marker_fire.rsi
    state: spawn
  - type: TimedDespawn
    lifetime: 1.5
  - type: SpawnOnDespawn
    prototype: WizardFireHELL

- type: entity
  name: волшебный огонь
  suffix: Не пропадает, Маг
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  description: Горячо!
  id: WizardFireHELL
  components:
  - type: Physics
  - type: Sprite
    layers:
    - sprite: _DeadSpace/Effects/fire.rsi
      state: fire
      shader: unshaded
      map: [ "unshaded" ]
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
           bounds: "-0.5,-0.5,0.5,0.5"
        layer:
        - MidImpassable
  - type: Temperature
  - type: AtmosExposed
  - type: PointLight
    enabled: true
    color: "#FF8C00"
    radius: 2.0
    energy: 2.0
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Heat: 5
    soundHit:
      path: "/Audio/Weapons/Guns/Hits/energy_meat1.ogg"
  - type: IgniteOnCollide
    fireStacks: 0.6
    count: 90
    fixtureId: fix1
  - type: Transform
    anchored: true
  - type: IgnitionSource
    temperature: 600
    ignited: true
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 45
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
    reactions:
    - reagents: [Water]
      methods: [Touch]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: 5
  - type: DamageContacts
    damage:
      types:
        Heat: 10
  - type: BrokenTechFireSpread
    maxRadius: 15
    spreadDelay: 2
    waterReagents:
    - Water
    - Holywater
    - CoconutWater

