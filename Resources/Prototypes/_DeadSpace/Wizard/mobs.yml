- type: entity
  parent: MarkerBase
  id: SpawnMobHellspawnWizard
  name: спавнер адского отродья мага
  components:
  - type: Sprite
    layers:
    - state: green
    - state: hellspawn
      sprite: Markers/mobs.rsi
  - type: ConditionalSpawner
    prototypes:
    - MobHellspawnWizard

- type: entity
  name: адское отродье
  parent: MobHellspawn
  suffix: Маг
  id: MobHellspawnWizard
  description: Нам конец.
  components:
  - type: GhostRole
    allowMovement: true
    makeSentient: true
    name: ghost-role-information-hellspawn-name
    description: ghost-role-information-hellspawn-description
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
  - type: StaminaResistance
    damageCoefficient: 0.01
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.5
    baseSprintSpeed: 4.5
  - type: SlowOnDamage
    speedModifierThresholds:
      760: 4
      890: 3
  - type: Reflect
    reflectProb: 0.9
    reflects:
      - Energy
  - type: MobThresholds
    thresholds:
      0: Alive
      1150: Dead
  - type: MeleeWeapon
    attackRate: 1
    hidden: true
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Blunt: 100
        Structural: 260
  - type: MobStateActions
    actions:
      Alive:
      - ActionHellspawnFireSpawn
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 0
    damage:
      types:
        Poison: -2
        Holy: -1
      groups:
        Brute: -4
        Burn: -4

- type: entity
  parent: MobCarpMagic
  id: MobCarpMagicWizard
  components:
  - type: NpcFactionMember
    factions:
    - Wizard

- type: entity
  name: маглет
  parent: [ SimpleSpaceMobBase, FlyingMobBase ]
  id: MobHamsterWizard
  description: Маленький помощник мага.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5
    baseWeightlessModifier: 1.5
  - type: Sprite
    drawdepth: SmallMobs
    sprite: Mobs/Pets/hamlet.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: hamster-0
  - type: SpriteMovement
    movementLayers:
      movement:
        state: hamster-moving-0
    noMovementLayers:
      movement:
        state: hamster-0
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-maglet-name
    description: ghost-role-information-maglet-description
    rules: ghost-role-information-familiar-rules
    requirements:
      - !type:OverallPlaytimeRequirement
        time: 72000 # 20 hours
  - type: GhostTakeoverAvailable
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: petting-success-hamster
    interactFailureString: petting-failure-hamster
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 1
  - type: Grammar
    attributes:
      proper: true
      gender: male
  - type: Tag
    tags:
    - CannotSuicide
    - Hamster
    - VimPilot
    - ChefPilot
  - type: FlavorProfile
    flavors:
    - meaty
    - sadness
  - type: Language
    knownLanguages:
    - GeneralLanguage
    cantSpeakLanguages:
    - GeneralLanguage
    unlockLanguagesAfterMakeSentient:
    - GeneralLanguage
  - type: GhostRoleNotifys
    groupPrototype: PetsGroup
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritLastWords
      Alive:
      - ActionRepulse
      - ActionForceWall
      - ActionKnock
      - ActionSmoke
  - type: MobThresholds
    thresholds:
      0: Alive
      125: Critical 
      200: Dead 
  - type: ReplacementAccent
    accent: mouse
  - type: Speech
    speechVerb: SmallMob
    speechSounds: Squeak
    allowedEmotes: ['Squeak']
  - type: CanEscapeInventory
    baseResistTime: 0.2
  - type: CarrySize
    size: Small
  - type: Inventory
    speciesId: sloth
    templateId: pet
  - type: Item
    size: Tiny
  - type: DamageStateVisuals
    states:
      Alive:
        Base: hamster-0
      Critical:
        Base: dead-0
      Dead:
        Base: splat-0