- type: entity
  save: false
  parent:
  - MobBloodstream
  - BaseMobSpecies
  id: BaseMobSpeciesComputer
  abstract: true
  components:
  - type: Blindable
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.11 #per second, scales with pressure and other constants.
# DS14-Soyuz-start
  - type: DamageOnEMP
    damage: 0.0005 # 25 damage on EMP grenade
  - type: IPC
  - type: Battery
    maxCharge: 1080
    startingCharge: 1080
# DS14-Soyuz-end
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
  - type: TypingIndicator
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: ZombieImmune
  - type: Repairable
    doAfterDelay: 3
    fuelCost: 10
    selfRepairPenalty: 3
    damage:
      types:
        Blunt: -15
        Piercing: -15
        Slash: -15
  - type: Damageable
    damageContainer: Silicon
    damageModifierSet: IPC
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritFakeDeath
  - type: Bloodstream
    bloodlossDamage:
      types:
        Bloodloss:
          1
    bloodlossHealDamage:
      types:
        Bloodloss:
          -1
    maxBleedAmount: 0
    bloodReferenceSolution:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 300
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
    showOverlays: true
    allowRevives: true
  - type: HealthExaminable
    examinableTypes:
      - Blunt
      - Slash
      - Piercing
      - Heat
      - Shock
    locPrefix: silicon
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - SeeingRainbows
    - Electrocution
    - SlurredSpeech
    - PressureImmunity
    - Muted
    - TemporaryBlindness
    - Pacified
  - type: LightningTarget
    priority: 2
    lightningExplode: false
# DS14-Soyuz-start
  - type: HandheldLight
    toggleOnInteract: false
    wattage: 0.2
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: radiating
      maxDuration: 2.0
      startValue: 3.0
      endValue: 2.0
      isLooped: true
      reverseWhenFinished: true
    - !type:PulseBehaviour
      id: blinking
      interpolate: Nearest
      maxDuration: 1.0
      startValue: 0.1
      endValue: 2.0
      isLooped: true
# DS14-Soyuz-end
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    radius: 3.5
    softness: 1
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: ImmunitetInfectionDead
  - type: Vocal
    sounds:
      Male: IPC
      Female: IPC
      Unsexed: IPC
  - type: DamagedSiliconAccent
    enableDamageCorruption: true
    damageAtMaxCorruption: 60
    enableChargeCorruption: false
  - type: Language
    selectedLanguage: GeneralLanguage
    knownLanguages:
    - MachineLanguage
    - GeneralLanguage
  - type: Tag
    tags:
    - IgnoreBedHealing #DS14-Soyuz
    - SiliconIPCEmotes
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
  # - type: FootPrints
