- type: entity
  name: blue shield laser pistol
  parent: BaseWeaponBatterySmall
  id: PistolBlueShield
  description: A pistol designed specifically for officers whose tasks include protecting members of the command stuff.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Battery/blueshield_gun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: BatteryAmmoProvider
    proto: VioletLaser
    fireCost: 50
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Guns/Battery/blueshield_gun.rsi
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    fireRate: 1.4
    soundGunshot:
      path: /Audio/_DeadSpace/Weapons/Guns/Gunshots/laser_shot.ogg
      params:
        volume: -2
  - type: StaticPrice
    price: 100
  - type: Appearance
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Battery
    maxCharge: 750
    startingCharge: 750
  - type: StealTarget #DS14
    stealGroup: PistolBlueShield #DS14   
  - type: Construction
    graph: UpgradePistolBlueShield
    node: start 

- type: entity
  parent: PistolBlueShield
  id: PistolBlueShieldUpgraded
  components:
  - type: BatterySelfRecharger
    autoRechargeRate: 30

- type: entity
  parent: BasicHitscan
  id: VioletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 25
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: muzzle_beam_violet
    travelFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: beam_violet
    impactFlash:
      sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/violethit.rsi
      state: impact_beam_violet
  - type: HitscanBasicEffects
    temperature: 10
