- type: entity
  name: боевое мачете СБ
  parent: Stunbaton
  id: Truncheonsec
  description: Электрошоковое мачете для обездвиживания или убийства людей. Имеет нелетальный и летальный режимы. Является улучшением шоковой дубинки для действительно трудных ситуаций.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Melee/truncheon_sec.rsi
    layers:
    - state: stunbaton_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Melee/truncheon_sec.rsi
    quickEquip: false
    slots:
    - Belt
    - Back
  - type: Stunbaton
    energyPerUse: 35
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: stunbaton_on}
          False: {state: stunbaton_off}
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 20
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    bluntStaminaDamageFactor: 2.0
    angle: 60
    animation: WeaponArcThrust
  - type: StaminaDamageOnHit
    damage: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: StaminaDamageOnCollide
    damage: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: LandAtCursor
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Reflect
    reflectProb: .15
    spread: 90
  - type: StaticPrice
    price: 80