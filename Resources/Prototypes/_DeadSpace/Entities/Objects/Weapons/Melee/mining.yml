  description: Поздний прототип протокинетического ускорителя в виде глефы, модифицированный с применением магмитовой стали. Лечит равномерно 45 механического и 5 физического повреждения.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Melee/magmite/magmite-glaive.rsi
  - type: Item
    size: Huge
    sprite: _DeadSpace/Objects/Weapons/Melee/magmite/magmite-glaive.rsi
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Melee/magmite/magmite-glaive.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: LeechOnMarker
    leech:
      groups:
        Brute: -45
        Burn: -5
  - type: MeleeWeapon
  - type: Tag
    tags:
      - Pickaxe