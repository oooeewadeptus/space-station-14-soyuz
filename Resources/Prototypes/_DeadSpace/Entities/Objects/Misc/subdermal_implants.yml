# DeathSquad implants

- type: entity
  parent: BaseSubdermalImplant
  id: RadioImplantDeathSquad
  name: имплант "радио"
  description: Этот имплант даёт доступ к радиочастоте UNKNOWN без гарнитуры.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
  - type: RadioImplant
    radioChannels: # DS14-Soyuz: radioChannel > radioChannels
    - DeathSquad

- type: entity
  parent: DeathRattleImplant
  id: DeathRattleImplantDeathSquad
  name: имплант "предсмертный хрип"
  description: Этот имплант сообщит по радиоканалу UNKNOWN, если пользователь окажется в критическом состоянии или умрёт.
  categories: [ HideSpawnMenu ]
  components:
  - type: RattleOnTrigger
    radioChannels: # DS14-Soyuz: radioChannel > radioChannels
    - DeathSquad

