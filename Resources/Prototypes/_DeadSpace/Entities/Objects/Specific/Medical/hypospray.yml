- type: entity
  name: инъектор дезоксиэфедрина
  parent: ChemicalMedipen
  id: DesoxyephedrineMedipen
  description: Медипен который помогает обрести максимальную мобильность в пылу сражения.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: steam
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: steam_empty
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20
        reagents:
        - ReagentId: Desoxyephedrine
          Quantity: 10
        - ReagentId: Dylovene
          Quantity: 10

- type: entity
  parent: SpaceMedipen
  id: NutritiousMedipen
  name: инъектор питательных веществ
  description: Содержит в себе питательные вещества, которые насытят твой организм едой и водой. Одного медипена хватает на 45 минут.
  components:
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 60
        reagents:
          - ReagentId: Nutriment
            Quantity: 30
          - ReagentId: Water
            Quantity: 30
