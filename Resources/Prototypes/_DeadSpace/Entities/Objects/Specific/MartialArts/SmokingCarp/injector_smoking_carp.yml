- type: entity
  parent: BaseItem
  id: SmokingCarpInjector
  name: свиток "Smoking Carp"
  description: На нём содержатся знания о древнем боевом искусстве, которые нельзя прочитать, но можно почувствовать. Ну, вам так кажется. Улёт в общем.
  components:
    - type: Sprite
      sprite: _DeadSpace/Objects/Misc/injector_smoking_carp.rsi
      layers:
      - state: icon
    - type: MartialArtsTrainingCarp
      addAtackRate: 1.15
      itemAfterLerning: SmokingCarpInjectorAfter
      params:
        - staminaDamageSmokePunch: 35.0
          hitDamageForPowerPunch: 20
          hitDamageForSmokePunch: 5
          ignoreResist: true
          damageTypeForPowerPunch: "Slash"
          damageTypeForSmokePunch: "Slash"
          effectPowerPunch: EffectPowerPunchCarp
          effectSmokePunch: WeaponArcBite
          hitSoundForSmokePunch: 
            path: /Audio/Effects/bite.ogg
          hitSoundForPowerPunch: 
            path: /Audio/Weapons/genhit1.ogg
          pushStrength: 4000
          maxPushDistance: 5
          packMessageOnHit:
            - voice-message-carp-1
            - voice-message-carp-2
            - voice-message-carp-3
            - voice-message-carp-4
            - voice-message-carp-5
            - voice-message-carp-6
            - voice-message-carp-7
            - voice-message-carp-8
            - voice-message-carp-9
            - voice-message-carp-10
            - voice-message-carp-11
            - voice-message-carp-12

- type: entity
  parent: BaseItem
  id: SmokingCarpInjectorAfter
  name: порванный чёрный папирус
  description: Оставшийся текст гласит "Smoking Carp". Кажется он вытягивает из вас силы, когда вы его держите.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Misc/injector_smoking_carp.rsi
    layers:
    - state: icon_after