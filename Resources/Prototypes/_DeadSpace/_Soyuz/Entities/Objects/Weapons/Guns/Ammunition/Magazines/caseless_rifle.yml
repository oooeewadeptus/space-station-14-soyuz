- type: entity
  id: MagazineCaselessRifleIncendiary
  name: "magazine (.25 caseless incendiary)"
  parent: BaseMagazineCaselessRifle
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeCaselessRifleIncendiary
  - type: Sprite
    scale: 1.2, 1.2 # DS-14
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: incendiary
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#3f1329"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#3f1329"

- type: entity
  id: MagazineCaselessRifleUranium
  name: "magazine (.25 caseless uranium)"
