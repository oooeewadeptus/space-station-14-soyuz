- type: entity
  parent: BasePlushie
  id: PlushieRedFox
  name: красная плюшевая лисичка
  description: Плюшевая игрушка красной лисы. Энергичная и весёлая, её приятно тискать.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Fun/toy_foxs.rsi
    state: plushie_redfox
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Animals/fox1.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Animals/fox1.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Animals/fox_squeak.ogg

