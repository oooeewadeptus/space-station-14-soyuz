- type: entity
  id: MechEquipmentOreCollector
  parent: BaseMechEquipment
  name: механический сборщик руды
  description: Устройство для сбора руды.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_orebox
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: MechCollector
    range: 1.6
    scanInterval: 1
    collectEnergyDelta: -0.5
    whitelist:
      tags:
      - Ore
      - ArtifactFragment
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Storage
    grid:
    - 0,0,15,5
    quickInsert: false
    clickInsert: false
    areaInsert: false
    showVerb: false
    maxItemSize: Normal
    whitelist:
      tags:
      - Ore
      - ArtifactFragment
  - type: Dumpable
  - type: Tag
    tags:
    - ClarkeEquipment

- type: entity
  id: MechEquipmentDrill
  parent: BaseMechEquipment
  name: гидравлический бур
  description: Мощный инструмент, служащий для быстрого бурения горных пород вашим личным мехом.
  components:
  - type: Sprite
    state: mecha_drill
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: MeleeWeapon
    mustBeEquippedToUse: true
    hidden: true
    autoAttack: true
    angle: 0
    attackRate: 3.5
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
    damage:
      groups:
        Brute: 3
      types:
        Structural: 15
  - type: Tag
    tags:
    - ClarkeEquipment
    - Pickaxe

- type: entity
  id: MechEquipmentDiamondDrill
  parent: BaseMechEquipment
  name: гидравлический алмазный бур
  description: Совершенное устройство в мире шахтёров. Позволяет вашему меху пробираться сквозь камни как нож сквозь масло.
  components:
  - type: Sprite
    state: mecha_diamond_drill
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: MeleeWeapon
    mustBeEquippedToUse: true
    hidden: true
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
    attackRate: 4
    damage:
      groups:
        Brute: 6
      types:
        Structural: 30
  - type: Tag
    tags:
    - ClarkeEquipment
    - Pickaxe