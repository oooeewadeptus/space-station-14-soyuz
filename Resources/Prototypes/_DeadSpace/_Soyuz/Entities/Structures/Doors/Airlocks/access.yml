    - /Maps/_Soyuz/Shuttles/Pilot/TU-212.yml
    - /Maps/_Soyuz/Shuttles/Pilot/SU-98.yml
    - /Maps/_Soyuz/Shuttles/Pilot/MIG-014.yml
