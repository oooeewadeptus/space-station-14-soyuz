- type: entity
  id: TungstenWindow
  name: вольфрамовое окно
  description: Смотри не заляпай.
  parent: [BaseDeltaPressureReinforcedGlass, WindowRCDResistant]
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _DeadSpace/_Soyuz/Structures/Windows/tungsten_window.rsi
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Structures/Windows/tungsten_window.rsi
  - type: Repairable
    fuelCost: 15
    doAfterDelay: 3
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: RGlass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassReinforced:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
          SheetTungsten:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    base: swindow
  - type: Construction
    graph: Window
    node: tungstenWindow
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 20
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks.rsi
  - type: StaticPrice
    price: 530

- type: entity
  parent: TungstenWindow
  id: TungstenWindowDiagonal
  suffix: diagonal
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _DeadSpace/_Soyuz/Structures/Windows/tungsten_window_diagonal.rsi
    state: state0
  - type: Tag
    tags:
    - Diagonal
    - Window
  - type: IconSmooth
    mode: Diagonal
    key: walls
    base: state
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Structures/Windows/tungsten_window_diagonal.rsi
    state: state0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.5,0.5"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: Airtight
    noAirWhenFullyAirBlocked: false
    airBlockedDirection:
    - South
    - East
  - type: DamageVisuals
    damageOverlay:
      sprite: Structures/Windows/cracks_diagonal.rsi
  - type: Construction
    graph: DiagonalWindow
    node: tungstendiagonalWindow


- type: entity
  parent: TungstenWindow
  id: TungstenWindowIndestructible
  suffix: Неразрушимое
  components:
  - type: Godmode

- type: entity
  parent: TungstenWindowDiagonal
  id: TungstenWindowDiagonalIndestructible
  suffix: Неразрушимое
  components:
  - type: Godmode