- type: entity
  parent: WallWood
  id: BambooWood
  name: бамбуковая стена
  description: Стена из бамбукового леса.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Structures/Walls/bamboo.rsi
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Structures/Walls/bamboo.rsi
#  - type: Construction
#    graph: Barricade
#    node: woodWall
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:ChangeConstructionNodeBehavior
        node: Barricade
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: IconSmooth
    key: woods
    base: bamboo
