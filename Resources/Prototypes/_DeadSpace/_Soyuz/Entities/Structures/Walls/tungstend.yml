- type: entity
  parent: BaseWall
  id: WallTungsten
  name: вольфрамовая стена
  description: Удерживает воздух внутри, а разнорабочих снаружи.
  components:
  - type: Sprite
    sprite: _DeadSpace/_Soyuz/Structures/Walls/tungsten.rsi
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Structures/Walls/tungsten.rsi
    state: full
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 650
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: StaticPrice
    price: 890
  - type: RadiationBlocker
    resistance: 5
  - type: IconSmooth
    key: walls
    base: state
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ShuttleWallVisuals.DeconstructionStage:
        ShuttleWallVisualLayers.Deconstruction:
          -1: { visible: false }
          0: { state: shuttle_construct-0, visible: true}
          1: { state: shuttle_construct-1, visible: true}
          2: { state: shuttle_construct-2, visible: true}
          3: { state: shuttle_construct-3, visible: true}
          4: { state: shuttle_construct-4, visible: true}
          5: { state: shuttle_construct-5, visible: true}
  - type: Reflect
    reflectProb: 0.5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 2000
  - type: Construction
    graph: Girder
    node: tungstenWall
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong


- type: entity
  parent: WallDiagonalBase
  id: WallTungstenDiagonal
  name: вольфрамовая стена
  description: Удерживает воздух внутри, а разнорабочих снаружи.
  components:
  - type: Sprite
    drawdepth: Walls
    sprite: _DeadSpace/_Soyuz/Structures/Walls/tungsten_diagonal.rsi
    state: state0
  - type: Icon
    sprite: _DeadSpace/_Soyuz/Structures/Walls/tungsten_diagonal.rsi
    state: state0
  - type: Reflect
    reflectProb: 0.25
  - type: Pullable
  - type: Airtight
    noAirWhenFullyAirBlocked: false
    airBlockedDirection:
    - South
    - East
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PolygonShape
            vertices:
            - "-0.5,-0.5"
            - "0.5,0.5"
            - "0.5,-0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 2000
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 650
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: Girder
    node: tungstendiagonalWall
  - type: RadiationBlocker
    resistance: 5
  - type: StaticPrice
    price: 590


- type: entity
  parent: WallTungsten
  id: WallTungstenIndestructible
  suffix: Неразрушимое
  components:
  - type: Godmode

- type: entity
  parent: WallTungstenDiagonal
  id: WallTungstenDiagonalIndestructible
  suffix: Неразрушимое
  components:
  - type: Godmode

