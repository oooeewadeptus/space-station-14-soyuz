# Скафандр Завхоза
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCargoContraband]
  id: ClothingOuterHardsuitSoyuzQuartermaster
  name: скафандр заведующего хозяйством
  description: Скафандр, разработанный специально для заведующих хозяйством предприятий. Оснащен умной системой поддержки жизненных показателей во время критического состояния.
  suffix: Work in Progress
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Hardsuits/salvage.rsi
  - type: Clothing
    sprite: Clothing/OuterClothing/Hardsuits/salvage.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.7
        Heat: 0.8
        Radiation: 0.5
        Caustic: 0.75
  - type: StaminaResistance
    damageCoefficient: 0.7
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitSoyuzQuartermaster
  - type: Tag
    tags:
    - CorgiWearable
    - Hardsuit
    - WhitelistChameleon
  - type: AutoInjectReagentClothingOnAllowedState
    durationRegenReagents: 90
    allowedStates:
    - Critical
    reagents:
      Bicaridine: 1
      Dexalin: 1
      Saline: 1

