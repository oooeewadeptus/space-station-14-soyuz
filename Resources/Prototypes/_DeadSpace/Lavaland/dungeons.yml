  - !type:CornerClutterDunGen
    contents: BaseClutter

  - !type:MobsDunGen
    minCount: 3
    maxCount: 6
    contents: LavalandLavaBrigMobs

  - !type:EntityTableDunGen
    minCount: 25
    maxCount: 40
    perDungeon: true
    table: !type:NestedSelector
      tableId: SalvageScrapSpawnerCommon
  - !type:EntityTableDunGen
    minCount: 30
    maxCount: 40
    perDungeon: true
    table: !type:NestedSelector
      tableId: SalvageScrapSpawnerValuable
  - !type:EntityTableDunGen
    minCount: 30
    maxCount: 45
    perDungeon: true
    table: !type:NestedSelector
      tableId: SalvageTreasureSpawnerCommon
  - !type:EntityTableDunGen
    minCount: 30
    maxCount: 45    
    perDungeon: true
    table: !type:NestedSelector
      tableId: SalvageTreasureSpawnerValuable


