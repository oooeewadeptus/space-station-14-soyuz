        maxVol: 45
        reagents:
          - ReagentId: Rororium
            Quantity: 10
          - ReagentId: Tricordrazine
            Quantity: 10
          - ReagentId: DexalinPlus
            Quantity: 5
          - ReagentId: TranexamicAcid
            Quantity: 5
          - ReagentId: Epinephrine
            Quantity: 5
          - ReagentId: Saline
            Quantity: 10
  - type: StaticPrice
    price: 300