- type: entity
  parent: BaseItem
  id: LavalandResonator
  name: резонатор
  description: Устройство, создающее резонансные поля для подрыва породы. Иногда дестабилизирует рудные жилы, выбивая больше руды.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/resonator.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/resonator.rsi
    storedRotation: -45
  - type: UseDelay
    delay: 0.35
  - type: LavalandResonator
    maxFields: 4
    shortBurstDelay: 1.8
    longBurstDelay: 3
    bonusYieldChance: 0.35
    bonusYieldMultiplier: 2

- type: entity
  parent: LavalandResonator
  id: LavalandSuperResonator
  name: супер резонатор
  description: Улучшенная версия обычного резонатора, что взрывает чутка больше в объёме.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/super_resonator.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/super_resonator.rsi
    storedRotation: -45
  - type: UseDelay
    delay: 0.18
  - type: LavalandResonator
    maxFields: 6
    shortBurstDelay: 0.75
    longBurstDelay: 1.5
    bonusYieldChance: 0
    bonusYieldMultiplier: 1
    burstProjectilePrototype: LavalandResonanceBolt
    burstProjectileCount: 4
    burstProjectileSpeed: 9

- type: entity
  parent: Pickaxe
  id: LavalandSilverPickaxe
  name: серебряная кирка
  description: Специальная кирка что позволет добыть чутка больше руды.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/silver_pickaxe.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/silver_pickaxe.rsi
    storedRotation: -45
  - type: MeleeWeapon
    attackRate: 0.85
    wideAnimationRotation: -135
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
      params:
        volume: -3
    damage:
      groups:
        Brute: 6
  - type: IncreaseDamageOnWield
    damage:
      groups:
        Brute: 11
      types:
        Structural: 35
  - type: LavalandMiningTool
    yieldMultiplier: 2
    cleaveTargets: 1
    cleaveYieldMultiplier: 1

- type: entity
  parent: Pickaxe
  id: LavalandDiamondPickaxe
  name: алмазная кирка
  description: Алмазная кирка что позволяет добыть ну очень много руды. А ну и ещё, оно даёт вам напоминание об первом правиле при копании руды.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/diamond_pickaxe.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/diamond_pickaxe.rsi
    storedRotation: -45
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: -135
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
      params:
        volume: -3
    damage:
      groups:
        Brute: 7
  - type: IncreaseDamageOnWield
    damage:
      groups:
        Brute: 13
      types:
        Structural: 45
  - type: LavalandMiningTool
    yieldMultiplier: 4
    cleaveTargets: 2
    cleaveYieldMultiplier: 2

- type: entity
  parent: MiningDrill
  id: LavalandSonicJackhammer
  name: скоростной отбойный молоток
  description: Отбойный молоток что делает тунели при копании.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/sonic_jackhammer.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/sonic_jackhammer.rsi
    storedRotation: -90
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
      params:
        volume: -2
    attackRate: 5
    damage:
      groups:
        Brute: 5
      types:
        Structural: 35
  - type: UseDelay
    delay: 2.5
  - type: LavalandSonicJackhammer

- type: entity
  parent: BaseItem
  id: LavalandShelterCapsule
  name: блюспейс капсула
  description: Капсула что позволяет вам сделать маленькую избушку на курьих ножках, да бы спастись от бури.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/survival_capsule.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/survival_capsule.rsi
  - type: UseDelay
    delay: 1
  - type: LavalandShelterCapsule

- type: entity
  parent: BaseItem
  id: LavalandWormholeJaunter
  name: джаунтер
  description: Устройство, способное спасти владельца от падения в пропасть. Должно быть в руке или надето на пояс; из сумки не срабатывает.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/wormhole_jaunter.rsi
    state: icon
  - type: Item
    size: Small
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/wormhole_jaunter.rsi
    storedRotation: -90
  - type: Clothing
    slots: [Belt]
    quickEquip: false
  - type: UseDelay
    delay: 1
  - type: LavalandJaunter

- type: entity
  parent: BaseItem
  id: LavalandMiningVoucher
  name: ваучер стартового набора шахтёра
  description: Ваучер что позволяет вам получить первый набор для работы. Используется на продвинутом Утильмаге в лаваленде.
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/mining_voucher.rsi
    state: icon
  - type: Item
    size: Tiny
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/mining_voucher.rsi
  - type: LavalandMiningVoucher
    rewards:
    - name: lavaland-mining-voucher-reward-survival
      entries:
      - id: LavalandShelterCapsule
      - id: ClothingBeltSalvageWebbing
    - name: lavaland-mining-voucher-reward-resonator
      entries:
      - id: LavalandResonator
      - id: MineralScanner
    - name: lavaland-mining-voucher-reward-crusher
      entries:
      - id: WeaponCrusher
      - id: ClothingBeltSalvageWebbing
      - id: FireExtinguisherMini
    - name: lavaland-mining-voucher-reward-extraction
      entries:
      - id: Fulton
      - id: FultonBeacon
    - name: lavaland-mining-voucher-reward-drill
      entries:
      - id: MiningDrill
      - id: MineralScanner

- type: entity
  parent: [ BaseSword, BaseMajorContraband ]
  id: LavalandSpectralBlade
  name: спектральный клинок
  description: Призрачный клинок с Некрополя. Почти бесполезен сам по себе, но становится сильнее, когда рядом есть мертвые гуманоиды или призванные духи.
  suffix: Lavaland
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Weapons/Melee/spectral_blade.rsi
    layers:
    - state: icon
      shader: unshaded
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Weapons/Melee/spectral_blade.rsi
    storedRotation: -45
    inhandVisuals:
      left:
      - state: inhand-left
        shader: unshaded
      right:
      - state: inhand-right
        shader: unshaded
    shape:
    - 0,0,0,3
  - type: MeleeWeapon
    attackRate: 1.15
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 6
    soundHit:
      path: /Audio/_DeadSpace/Lavaland/SpectralBlade/ghost2.ogg
      params:
        volume: -2
  - type: LavalandSpectralBlade
  - type: DisarmMalus

- type: entity
  parent: [ BaseSword, BaseMajorContraband ]
  id: LavalandSpellBlade
  name: клинок заклинаний
  description: Магический клинок, выпускающий разящие энергетические лезвия.
  suffix: Lavaland
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Weapons/Melee/spell_blade.rsi
    layers:
    - state: icon
      shader: unshaded
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Weapons/Melee/spell_blade.rsi
    storedRotation: -45
    inhandVisuals:
      left:
      - state: inhand-left
        shader: unshaded
      right:
      - state: inhand-right
        shader: unshaded
    shape:
    - 0,0,3,0
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: 135
    resistanceBypass: true
    damage:
      types:
        Slash: 20
    soundHit:
      path: /Audio/_DeadSpace/Lavaland/SpellBlade/rapierhit.ogg
      params:
        volume: -2
  - type: Gun
    fireRate: 1
    useKey: false
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    minAngle: 0
    maxAngle: 0
    angleIncrease: 0
    angleDecay: 0
    cameraRecoilScalar: 0
    projectileSpeed: 25
    soundGunshot:
      path: /Audio/_DeadSpace/Lavaland/SpellBlade/fireball.ogg
      params:
        volume: -2
  - type: AmmoCounter
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 4
    rechargeSound: null
  - type: BasicEntityAmmoProvider
    proto: LavalandSpellBladeProjectile
    capacity: 4
    count: 4
  - type: DisarmMalus

- type: entity
  id: LavalandSpellBladeProjectile
  parent: BaseBullet
  name: blade energy
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _DeadSpace/Lavaland/Objects/Weapons/Projectiles/spell_blade.rsi
    layers:
    - state: lavastaff
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectLaser
    ignoreResistances: true
    damage:
      types:
        Heat: 15
        Slash: 5
    soundHit:
      path: /Audio/_DeadSpace/Lavaland/SpellBlade/rapierhit.ogg
      params:
        volume: -2
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: 1
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 0.01
    intensitySlope: 1
    maxIntensity: 0.01
    maxTileBreak: 0
    tileBreakScale: 0.01
    canCreateVacuum: false
  - type: StunOnCollide
    slowdownAmount: 1.25
    walkSpeedModifier: 0.75
    sprintSpeedModifier: 0.75
    drop: false
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 1.5
    color: "#ff5b26"

- type: entity
  parent: WeaponStaffBase
  id: LavalandFireStaff
  name: посох лавы
