      path: /Audio/Weapons/plasma_cutter.ogg
      params:
        volume: -4
  - type: GatheringProjectile
    amount: 1
  - type: TimedDespawn
    lifetime: 0.35
  - type: PointLight
    radius: 1.5
    energy: 0.8
    color: "#7de8ff"
