    color: "#ff5b26"

- type: entity
  parent: BaseItem
  id: LavalandHierophantStaff
  name: посох Иерофанта
  description: Странный артефакт с квадратным узором, проводящий ослабленные атаки Иерофанта.
  suffix: Lavaland
  components:
  - type: Sprite
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/HierophantClub.rsi
    layers:
    - state: hierophant_club
  - type: Item
    size: Normal
    sprite: _DeadSpace/Lavaland/Objects/Specific/Mining/HierophantClub.rsi
    storedRotation: -45
  - type: MeleeWeapon
    angle: 0
    attackRate: 0.8
    animation: WeaponArcPunch
    soundHit:
      path: /Audio/_DeadSpace/Lavaland/Hierophant/sonic_jackhammer.ogg
      params:
        volume: -3
    damage:
      types:
        Blunt: 10
        Heat: 5
  - type: LavalandHierophantStaff
  - type: ActionGrant
    actions:
    - ActionLavalandHierophantStaffCross
    - ActionLavalandHierophantStaffBurst
    - ActionLavalandHierophantStaffBlink
    - ActionLavalandHierophantStaffChaser
  - type: ItemActionGrant
    actions:
    - ActionLavalandHierophantStaffCross
    - ActionLavalandHierophantStaffBurst
    - ActionLavalandHierophantStaffBlink
    - ActionLavalandHierophantStaffChaser

- type: entity
  parent: BaseAction
  id: ActionLavalandHierophantStaffCross
  name: крест Иерофанта
  description: Создает короткий крестообразный взрыв в указанной точке.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 8
  - type: TargetAction
    range: 8
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:LavalandHierophantStaffCrossActionEvent
      telegraphPrototype: LavalandHierophantTelegraphCardinal

- type: entity
  parent: BaseAction
  id: ActionLavalandHierophantStaffBurst
  name: волна Иерофанта
  description: Выпускает расходящуюся квадратную волну вокруг указанной точки.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 11
  - type: TargetAction
    range: 7
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:LavalandHierophantStaffBurstActionEvent

- type: entity
  parent: BaseAction
  id: ActionLavalandHierophantStaffBlink
  name: скачок Иерофанта
  description: Телепортирует в ближайшую точку и вызывает взрывы вокруг старой и новой позиции.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 14
  - type: TargetAction
    range: 9
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:LavalandHierophantStaffBlinkActionEvent

- type: entity
  parent: BaseAction
  id: ActionLavalandHierophantStaffChaser
  name: преследователь Иерофанта
  description: Отправляет короткую линию взрывов к выбранному существу.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 12
  - type: TargetAction
    range: 8
    checkCanAccess: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
    event: !type:LavalandHierophantStaffChaserActionEvent

- type: entity
  id: LavalandResonanceField
  name: resonance field
  description: A resonating energy field ready to rupture.
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/chronofield.rsi
      state: chronofield
      shader: unshaded
  - type: PointLight
    radius: 1.8
    energy: 1.2
    color: "#7de8ff"
  - type: LavalandResonanceField

